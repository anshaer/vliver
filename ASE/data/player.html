<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASE API </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://storage.googleapis.com/ase-player-cdn/ase-player.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #1e1e1e; 
            display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .player-viewport {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        #ase-canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain; 
            background: transparent;
        }
        #loading-txt {
            position: absolute; color: #8ee3cf; font-size: 16px;
            font-weight: bold; letter-spacing: 1px; text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="player-viewport">
    <div id="loading-txt">正在調用官方 API 加載專案 01.ase...</div>
    <canvas id="ase-canvas" style="display:none;"></canvas>
</div>
<script>
    window.addEventListener('DOMContentLoaded', () => {
        AsePlayer.loadAndPlay('001.ase', 'ase-canvas', 'loading-txt');    
    });
    window.addEventListener('ase-event', (e) => {
        console.log(`[全域事件捕捉] 影格 ${e.detail.node} 觸發自訂指令: ${e.detail.eventName}`);
    });
</script>
</body>
</html>
