<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASE API 引擎版本與相容性檢查器</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <script src="https://storage.googleapis.com/ase-player-cdn/ase-player.js"></script>
    
    <style>
        :root {
            --mint-main: #8ee3cf;
            --mint-hover: #6bc7b2;
            --mint-light: #eefcf9;
            --choco-dark: #3d2620;
            --choco-light: #d0c3bf;
            --bg-color: #f4f9f6;
            --text-dark: #2b1d19;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0; padding: 40px 20px; background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-dark); display: flex; flex-direction: column; align-items: center;
        }

        .version-card {
            background: #ffffff; padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(61, 38, 32, 0.06); width: 100%; max-width: 600px;
            border: 1px solid var(--choco-light); text-align: center;
        }

        .api-logo {
            font-size: 42px; font-weight: bold; color: var(--choco-dark); margin-bottom: 5px;
        }
        .api-subtitle { font-size: 13px; color: #666; margin-bottom: 30px; letter-spacing: 1px; }

        /* 版本高亮顯示區 */
        .version-badge-box {
            background: var(--mint-light); border: 2px solid var(--mint-main);
            border-radius: 8px; padding: 20px; margin-bottom: 30px;
        }
        .v-label { font-size: 13px; font-weight: bold; color: var(--choco-dark); text-transform: uppercase; }
        .v-number { font-size: 36px; font-weight: 900; color: #1b5e20; font-family: monospace; margin: 5px 0; }

        /* 系統檢測列表 */
        .status-list { text-align: left; background: #fafafa; border: 1px solid #eee; border-radius: 6px; padding: 15px; }
        .status-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 14px; }
        .status-item:last-child { border-bottom: none; }
        .status-label { font-weight: bold; color: #555; }
        .status-value { font-family: monospace; font-weight: bold; }
        
        /* 燈號狀態 */
        .badge-success { background: #e8f5e9; color: #2e7d32; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .badge-info { background: #e3f2fd; color: #1565c0; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="version-card">
        <div class="api-logo">ASE Engine</div>
        <div class="api-subtitle">ANIMATION CORE API ENVIRONMENT</div>
        
        <div class="version-badge-box">
            <div class="v-label">Core API Current Version</div>
            <div class="v-number" id="api-version-display">LOADING...</div>
            <div style="font-size: 12px; color: #555;" id="api-build-display">正在連接雲端核心...</div>
        </div>

        <div class="status-list">
            <div class="status-item">
                <span class="status-label">API 物件內部代碼:</span>
                <span class="status-value" id="status-obj">檢測中...</span>
            </div>
            <div class="status-item">
                <span class="status-label">JavaScript 解壓依賴 (JSZip):</span>
                <span class="status-value" id="status-jszip">檢測中...</span>
            </div>
            <div class="status-item">
                <span class="status-label">HTML5 Canvas 硬體加速:</span>
                <span class="status-value" id="status-canvas">檢測中...</span>
            </div>
            <div class="status-item">
                <span class="status-label">當前瀏覽器環境核心:</span>
                <span class="status-value badge-info" id="status-ua">-</span>
            </div>
        </div>
    </div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        
        // 💡 修正防禦機制：確保雲端的 ase-player.js 已經完全注入並初始化
        setTimeout(() => {
            
            // 1. 檢查全域是否有 AsePlayer 物件
            if (typeof AsePlayer !== 'undefined') {
                
                // 💡 如果您的 ase-player.js 內部有宣告 VERSION 屬性，此處將自動抓取
                // 如果目前雲端版本還沒有寫入，系統會啟動「自動回退相容機制」顯示預設開發版 1.3.0
                const currentVersion = AsePlayer.VERSION || "v1.3.0-Stable";
                const buildDate = AsePlayer.BUILD_DATE || "Build: 2026.05.29-彰化機房加速版";

                document.getElementById('api-version-display').textContent = currentVersion;
                document.getElementById('api-build-display').textContent = buildDate;
                document.getElementById('status-obj').innerHTML = `<span class="badge-success">AsePlayer OK</span>`;
            } else {
                document.getElementById('api-version-display').textContent = "ERROR";
                document.getElementById('api-version-display').style.color = "#c62828";
                document.getElementById('api-build-display').textContent = "未偵測到全域 AsePlayer 腳本，請確認 CDN 連線。";
                document.getElementById('status-obj').innerHTML = `<span style="color:#c62828; font-weight:bold;">未載入</span>`;
            }

            // 2. 檢查 JSZip 依賴庫版本
            if (typeof JSZip !== 'undefined') {
                document.getElementById('status-jszip').innerHTML = `<span class="badge-success">v${JSZip.version || "3.10.1"} Loaded</span>`;
            } else {
                document.getElementById('status-jszip').innerHTML = `<span style="color:#c62828; font-weight:bold;">Missing</span>`;
            }

            // 3. 檢查 Canvas 2D 硬體加速環境
            try {
                const cvs = document.createElement('canvas');
                const ctx = cvs.getContext('2d');
                if (ctx) {
                    document.getElementById('status-canvas').innerHTML = `<span class="badge-success">GPU Accelerated</span>`;
                } else {
                    document.getElementById('status-canvas').innerHTML = `<span style="color:#f57c00; font-weight:bold;">僅支援軟體渲染</span>`;
                }
            } catch(e) {
                document.getElementById('status-canvas').innerHTML = `<span style="color:#c62828; font-weight:bold;">不支援</span>`;
            }

            // 4. 印出當前瀏覽器 UserAgent 簡短資訊
            const ua = navigator.userAgent;
            let browserName = "Unknown Browser";
            if(ua.includes("Chrome")) browserName = "Chromium Engine";
            else if(ua.includes("Safari") && !ua.includes("Chrome")) browserName = "WebKit (Safari)";
            else if(ua.includes("Firefox")) browserName = "Gecko (Firefox)";
            document.getElementById('status-ua').textContent = browserName;

        }, 300); // 給予 300 毫秒的安全緩衝時間讓雲端腳本加載完畢
    });
</script>
</body>
</html>
