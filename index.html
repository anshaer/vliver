<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>?????</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            overflow: hidden; /* 防止出現滾動條 */
            font-family: "Microsoft JhengHei", sans-serif;
        }

        /* 飄浮文字的基礎樣式 */
        .floating-text {
            position: absolute;
            bottom: -50px; /* 從螢幕下方開始 */
            color: #00ffcc;
            font-weight: bold;
            white-space: nowrap;
            pointer-events: none; /* 讓滑鼠點不到，避免干擾操作 */
            user-select: none;
            filter: drop-shadow(0 0 5px rgba(0, 255, 204, 0.5));
            animation: floatUp linear forwards;
        }

        /* 定義上升動畫 */
        @keyframes floatUp {
            to {
                transform: translateY(-110vh); /* 向上移動超過螢幕高度 */
                opacity: 0;
            }
        }
    </style>
</head>
<body>

<script>
    const phrases = ["蛤", "自動清除", "先卡位", "還在設定", "單一網頁黨", "漂浮中", "還在建"];
    
    function createFloatingText() {
        const span = document.createElement('span');
        
        // 隨機選擇文字內容
        span.innerText = phrases[Math.floor(Math.random() * phrases.length)];
        span.className = 'floating-text';

        // 隨機設定水平位置與樣式
        const leftPos = Math.random() * 100; // 0% 到 100%
        const duration = 3 + Math.random() * 5; // 3 到 8 秒之間
        const fontSize = 16 + Math.random() * 24; // 16px 到 40px
        const opacity = 0.5 + Math.random() * 0.5;

        span.style.left = `${leftPos}%`;
        span.style.animationDuration = `${duration}s`;
        span.style.fontSize = `${fontSize}px`;
        span.style.opacity = opacity;

        document.body.appendChild(span);

        // --- 核心記憶體管理：動畫結束後自動移除元素 ---
        span.addEventListener('animationend', () => {
            span.remove();
        });
    }

    // 每隔 300 毫秒產生一個新文字
    setInterval(createFloatingText, 300);
</script>

</body>
</html>
