
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業多軌混音工作站</title>
    <style>
        :root {
            --mint-light: #e0f2e9;
            --mint-main: #a3e4d7;
            --mint-dark: #8ed6c8;
            --choco-main: #4e342e;
            --choco-light: #6d4c41;
            --choco-dark: #3e2723;
            /* 1秒 = 200px, 所以 0.1秒 = 20px */
            --pps: 200px; 
            --grid-minor: 20px;
        }

        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #eceff1;
            display: flex; flex-direction: column;
            overflow: hidden; /* 鎖死外層，內部滾動 */
        }

        /* 頂部工具列 */
        .toolbar {
            background-color: var(--choco-main);
            color: var(--mint-light);
            padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 50;
        }

        .toolbar-group { display: flex; align-items: center; gap: 15px; }
        h1 { margin: 0; font-size: 18px; color: var(--mint-main); }
        input[type="file"] { display: none; }

        .btn {
            background-color: var(--mint-main); color: var(--choco-dark);
            border: none; padding: 8px 16px; border-radius: 6px;
            cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s;
        }
        .btn:hover { background-color: var(--mint-dark); }
        .btn:disabled { background-color: #a0a0a0; cursor: not-allowed; }

        /* 工作區佈局 (左側標題區 + 右側時間軸區) */
        .workspace {
            flex: 1;
            display: flex;
            overflow: hidden; /* 防止超出 */
            position: relative;
        }

        /* 左側軌道控制面板 */
        .sidebar {
            width: 200px;
            background-color: var(--mint-light);
            border-right: 2px solid var(--choco-main);
            overflow-y: hidden; /* 跟隨右側同步滾動 */
            display: flex; flex-direction: column;
            z-index: 10;
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
        }

        .sidebar-track {
            height: 140px; /* 固定軌道高度 */
            border-bottom: 2px solid var(--choco-main);
            padding: 10px;
            box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: center; gap: 8px;
        }

        .track-name { font-size: 12px; font-weight: bold; color: var(--choco-dark); word-break: break-all; }
        .btn-danger { background-color: #e57373; color: white; border: none; padding: 5px; border-radius: 4px; cursor: pointer; font-size: 12px;}
        .btn-danger:hover { background-color: #ef5350; }

        /* 右側時間軸滾動視窗 */
        .timeline-viewport {
            flex: 1;
            overflow-x: auto; /* 允許橫向滾動 */
            overflow-y: auto; /* 允許垂直滾動 */
            position: relative;
            background-color: #fff;
        }

        /* 實際的時間軸容器 (寬度會動態變大) */
        .timeline-container {
            position: relative;
            min-height: 100%;
            /* 預設寬度，稍後會由 JS 根據音檔長度撐開 */
            width: 1000px; 
        }

        /* 背景網格 (大格1秒，小格0.1秒) */
        .timeline-grid {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(to right, rgba(78,52,46,0.3) 1px, transparent 1px),
                linear-gradient(to right, rgba(78,52,46,0.08) 1px, transparent 1px);
            background-size: var(--pps) 100%, var(--grid-minor) 100%;
            pointer-events: none; /* 不干擾點擊 */
            z-index: 0;
        }

        /* 右側波形軌道列 */
        .timeline-track-row {
            height: 140px;
            border-bottom: 2px solid var(--choco-light);
            position: relative;
            box-sizing: border-box;
        }

        /* 音訊片段 (Clip) - 核心定位對象 */
        .audio-clip {
            position: absolute; /* 絕對定位，不被擠壓 */
            top: 10px;
            height: 120px;
            background-color: rgba(163, 228, 215, 0.2);
            border: 1px solid var(--mint-main);
            border-radius: 4px;
            display: flex; flex-direction: column;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            /* width 和 left 會由 JS 控制 */
        }

        /* Clip 上方的拖拉把手 */
        .clip-handle {
            height: 20px;
            background-color: var(--choco-light);
            color: var(--mint-light);
            font-size: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: grab;
            user-select: none;
            border-radius: 3px 3px 0 0;
        }
        .clip-handle:active { cursor: grabbing; background-color: var(--choco-dark); }

        /* 裝載 WaveSurfer 的容器 */
        .clip-waveform {
            flex: 1;
            width: 100%;
            position: relative;
        }

    </style>
</head>
<body>

<div class="toolbar">
    <div class="toolbar-group">
        <h1>多軌混音工作站</h1>
        <label class="btn" style="background-color: var(--mint-light);">
            <input type="file" id="audio-upload" accept="audio/*" multiple>
            📁 新增音軌
        </label>
    </div>

    <div class="toolbar-group">
        <button id="export-btn" class="btn">💾 照時間軸混音並輸出 WAV</button>
    </div>
</div>

<div class="workspace">
    <div class="sidebar" id="sidebar"></div>
    
    <div class="timeline-viewport" id="viewport">
        <div class="timeline-container" id="timeline">
            <div class="timeline-grid"></div>
            <div id="tracks-content"></div>
        </div>
    </div>
</div>

<script type="module">
    import WaveSurfer from 'https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.esm.js';
    import EnvelopePlugin from 'https://unpkg.com/wavesurfer.js@7/dist/plugins/envelope.esm.js';

    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const sidebar = document.getElementById('sidebar');
    const tracksContent = document.getElementById('tracks-content');
    const timeline = document.getElementById('timeline');
    const viewport = document.getElementById('viewport');
    
    // 全域設定：1秒鐘 = 200px
    const PIXELS_PER_SECOND = 200; 
    let tracks = []; 

    // 同步左右兩側的垂直滾動
    viewport.addEventListener('scroll', () => {
        sidebar.scrollTop = viewport.scrollTop;
    });

    // 動態更新時間軸總寬度 (最長音軌 + 2秒)
    function updateTimelineWidth() {
        if (tracks.length === 0) {
            timeline.style.width = '100%';
            return;
        }
        // 找出 (起點 offset + 音檔本身長度) 的最大值
        const maxTime = tracks.reduce((max, t) => Math.max(max, t.offset + t.duration), 0);
        const totalSeconds = maxTime + 2; // 多留 2 秒空白
        
        // 算出對應的像素寬度
        const calculatedWidth = totalSeconds * PIXELS_PER_SECOND;
        
        // 確保至少填滿畫面，避免縮圖破圖
        const minWidth = viewport.clientWidth;
        timeline.style.width = `${Math.max(calculatedWidth, minWidth)}px`;
    }

    // 處理上傳檔案
    document.getElementById('audio-upload').addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;

        for (const file of files) {
            await addTrack(file);
        }
        e.target.value = ''; 
    });

    async function addTrack(file) {
        const trackId = 'track_' + Date.now() + Math.floor(Math.random() * 1000);
        
        const arrayBuffer = await file.arrayBuffer();
        const decodedBuffer = await audioContext.decodeAudioData(arrayBuffer);
        const duration = decodedBuffer.duration;
        
        // 新音軌預設放在 0 秒處
        const initialOffset = 0; 
        // 實體長度計算 (絕對不會被擠壓)
        const clipWidthPx = duration * PIXELS_PER_SECOND;

        /* --- 左側控制面板 --- */
        const sidebarRow = document.createElement('div');
        sidebarRow.className = 'sidebar-track';
        sidebarRow.innerHTML = `
            <div class="track-name" title="${file.name}">${file.name}</div>
            <div style="font-size: 11px; color: #666;">長度: ${duration.toFixed(2)}s</div>
            <button class="btn-danger" onclick="removeTrack('${trackId}')">🗑️ 刪除</button>
        `;
        sidebar.appendChild(sidebarRow);

        /* --- 右側時間軸軌道 --- */
        const trackRow = document.createElement('div');
        trackRow.className = 'timeline-track-row';

        // 獨立音訊片段 (Clip)
        const clip = document.createElement('div');
        clip.className = 'audio-clip';
        clip.style.width = `${clipWidthPx}px`;
        clip.style.left = `${initialOffset * PIXELS_PER_SECOND}px`;

        // 拖拉把手 (Studio One 風格)
        const dragHandle = document.createElement('div');
        dragHandle.className = 'clip-handle';
        dragHandle.textContent = '⋮⋮ 左右拖拉移動位置 ⋮⋮';
        
        // 波形容器
        const wsContainer = document.createElement('div');
        wsContainer.className = 'clip-waveform';

        clip.appendChild(dragHandle);
        clip.appendChild(wsContainer);
        trackRow.appendChild(clip);
        tracksContent.appendChild(trackRow);

        // 初始化 WaveSurfer
        const ws = WaveSurfer.create({
            container: wsContainer,
            waveColor: '#a3e4d7',
            progressColor: '#4e342e',
            cursorColor: '#d32f2f',
            height: 'auto', // 填滿 wsContainer
            normalize: true,
            interact: false // 關閉點擊跳轉，避免與拖拉衝突
        });

        const envelope = ws.registerPlugin(EnvelopePlugin.create({
            volume: 1,
            lineColor: 'rgba(78, 52, 46, 0.8)',
            lineWidth: 3, dragPointSize: 12, dragLine: true, dragPoint: true,
        }));

        const trackData = {
            id: trackId,
            sidebarRow: sidebarRow,
            trackRow: trackRow,
            clipElement: clip,
            wavesurfer: ws,
            buffer: decodedBuffer,
            duration: duration,
            offset: initialOffset,
            envelopePoints: []
        };

        envelope.on('points-change', (points) => trackData.envelopePoints = points);

        // 載入波形
        ws.load(URL.createObjectURL(file));
        tracks.push(trackData);
        
        // 更新畫布寬度
        updateTimelineWidth();

        /* --- 拖拉排程邏輯 (Drag & Drop) --- */
        let isDragging = false;
        let startX = 0;
        let startLeft = 0;

        dragHandle.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            // 取得目前的 left 像素值
            startLeft = parseFloat(clip.style.left) || 0;
            document.body.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - startX;
            let newLeft = startLeft + deltaX;
            
            // 限制不能拖到 0 秒之前
            if (newLeft < 0) newLeft = 0;
            
            clip.style.left = `${newLeft}px`;
            // 更新真實秒數 offset
            trackData.offset = newLeft / PIXELS_PER_SECOND;
            
            // 拖拉時即時更新總畫布寬度
            updateTimelineWidth();
        });

        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                document.body.style.cursor = 'default';
            }
        });
    }

    // 刪除軌道
    window.removeTrack = function(trackId) {
        const index = tracks.findIndex(t => t.id === trackId);
        if (index > -1) {
            tracks[index].wavesurfer.destroy();
            tracks[index].sidebarRow.remove();
            tracks[index].trackRow.remove();
            tracks.splice(index, 1);
            updateTimelineWidth();
        }
    }

    // 核心：照時間軸混音編譯輸出
    document.getElementById('export-btn').addEventListener('click', async () => {
        if (tracks.length === 0) return alert('請至少上傳一條音軌');

        const btn = document.getElementById('export-btn');
        btn.textContent = '⏳ 照時間軸編譯中...';
        btn.disabled = true;

        try {
            // 計算輸出檔總長度 (含使用者拖拉的 Offset)
            const maxDuration = tracks.reduce((max, t) => Math.max(max, t.offset + t.duration), 0) + 2;
            const sampleRate = 44100;
            const offlineCtx = new OfflineAudioContext(2, Math.ceil(maxDuration * sampleRate), sampleRate);

            tracks.forEach(track => {
                const source = offlineCtx.createBufferSource();
                source.buffer = track.buffer;
                const gainNode = offlineCtx.createGain();

                // 套用音量節點 (Envelope)
                if (track.envelopePoints && track.envelopePoints.length > 0) {
                    const sortedPoints = [...track.envelopePoints].sort((a, b) => a.time - b.time);
                    
                    // 注意：Envelope 的時間是「相對於該音軌起點」，所以編譯時要加上 track.offset
                    const startTime = track.offset;

                    if (sortedPoints[0].time > 0) gainNode.gain.setValueAtTime(1, startTime);
                    else gainNode.gain.setValueAtTime(sortedPoints[0].volume, startTime);

                    sortedPoints.forEach(p => {
                        gainNode.gain.linearRampToValueAtTime(p.volume, startTime + p.time);
                    });

                    const lastVol = sortedPoints[sortedPoints.length - 1].volume;
                    gainNode.gain.setValueAtTime(lastVol, startTime + track.duration);
                } else {
                    gainNode.gain.setValueAtTime(1, 0);
                }

                source.connect(gainNode);
                gainNode.connect(offlineCtx.destination);
                
                // 關鍵：依照拖拉排程的時間點 (offset) 開始播放
                source.start(track.offset);
            });

            const renderedBuffer = await offlineCtx.startRendering();
            const wavBlob = audioBufferToWav(renderedBuffer);
            
            const downloadLink = document.createElement('a');
            downloadLink.href = URL.createObjectURL(wavBlob);
            downloadLink.download = 'Studio_Mixdown.wav';
            downloadLink.click();

        } catch (error) {
            console.error(error);
            alert('編譯失敗，請查看 Console。');
        } finally {
            btn.textContent = '💾 照時間軸混音並輸出 WAV';
            btn.disabled = false;
        }
    });

    // 轉 WAV 格式演算法
    function audioBufferToWav(buffer) {
        const numOfChan = buffer.numberOfChannels;
        const length = buffer.length * numOfChan * 2 + 44;
        const arrayBuffer = new ArrayBuffer(length);
        const view = new DataView(arrayBuffer);
        const channels = [];
        let offset = 0, pos = 0;

        const setUint16 = (data) => { view.setUint16(pos, data, true); pos += 2; };
        const setUint32 = (data) => { view.setUint32(pos, data, true); pos += 4; };
        
        setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157);
        setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
        setUint32(buffer.sampleRate); setUint32(buffer.sampleRate * 2 * numOfChan);
        setUint16(numOfChan * 2); setUint16(16); setUint32(0x61746164); setUint32(length - pos - 4);

        for(let i = 0; i < numOfChan; i++) channels.push(buffer.getChannelData(i));

        while(pos < length) {
            for(let i = 0; i < numOfChan; i++) {
                let sample = Math.max(-1, Math.min(1, channels[i][offset]));
                sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0;
                view.setInt16(pos, sample, true); pos += 2;
            }
            offset++;
        }
        return new Blob([arrayBuffer], {type: "audio/wav"});
    }
</script>
</body>
</html>
