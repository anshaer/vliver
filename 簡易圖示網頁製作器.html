<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>8欄多區塊網頁編輯器 V3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,'Noto Sans TC',sans-serif;background:#202020;color:#eee}.editor{display:grid;grid-template-columns:230px 1fr 330px;height:100vh}.panel{background:#2e2e2e;padding:14px;overflow:auto}.tool{padding:12px;margin:8px 0;background:#444;border:1px solid #666;border-radius:10px;cursor:grab;text-align:center}.stage{padding:20px;overflow:auto;text-align:center}.device-buttons{display:flex;gap:8px;justify-content:center;margin-bottom:12px}.device-buttons button{width:auto}.canvas{margin:auto;width:100%;max-width:800px;min-height:760px;background:#fff;color:#111;border-radius:22px;padding:12px;box-shadow:0 0 0 8px #111;background-size:cover;background-position:center;background-repeat:no-repeat;transition:.2s}.canvas.mobile{max-width:430px}.canvas.tablet{max-width:768px}.canvas.desktop{max-width:800px}.area{display:grid;grid-template-columns:repeat(8,1fr);grid-auto-rows:40px;gap:8px;padding:8px}.headerArea,.footerArea{background:transparent}.contentArea{min-height:520px}.block{position:relative;padding:8px;border:2px solid rgba(153,153,153,1);background:rgba(255,255,255,1);overflow:hidden;cursor:move;display:flex;white-space:pre-wrap;word-break:break-word}.block.selected{outline:3px solid #1e90ff}.block.dragging{opacity:.45}.content{width:100%;height:100%;display:flex;white-space:pre-wrap;word-break:break-word}.content img,.content video,.content iframe{max-width:100%;max-height:100%;width:100%;height:100%;object-fit:cover;border:0}.badge{position:absolute;right:4px;bottom:3px;background:#0008;color:#fff;font-size:10px;padding:2px 5px;border-radius:4px;pointer-events:none}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}button,input,select,textarea{width:100%;padding:8px;margin:4px 0;border-radius:8px;border:1px solid #666;background:#1f1f1f;color:#fff}button{background:#3d6cff;border:0;cursor:pointer}textarea{min-height:90px}.nav a{margin:0 6px;color:inherit;text-decoration:underline}.mobileNav{display:none}.desktopNav{display:block}input[type=color]{height:38px;padding:2px;background:transparent;border:1px solid #666;border-radius:8px}@media(max-width:600px){.desktopNav{display:none}.mobileNav{display:block}.mobileNav summary{cursor:pointer;padding:6px 10px;border:1px solid currentColor;border-radius:8px;display:inline-block}.mobileNav a{display:block;margin:8px 0}}.canvas.mobile .desktopNav{display:none}.canvas.mobile .mobileNav{display:block}.canvas.mobile .mobileNav summary{cursor:pointer;padding:6px 10px;border:1px solid currentColor;border-radius:8px;display:inline-block}.canvas.mobile .mobileNav a{display:block;margin:8px 0}label{display:block;margin-top:9px;font-size:13px}hr{border:0;border-top:1px solid #555;margin:14px 0}.hint{font-size:12px;color:#bbb;line-height:1.5}
</style>
</head>
<body>
<div class="editor">
<aside class="panel">
<h2>區塊</h2>
<div class="tool" draggable="true" data-type="header">頁首區塊</div>
<div class="tool" draggable="true" data-type="text">文字區塊</div>
<div class="tool" draggable="true" data-type="blank">空白區塊</div>
<div class="tool" draggable="true" data-type="image">圖片區塊</div>
<div class="tool" draggable="true" data-type="video">影片區塊</div>
<div class="tool" draggable="true" data-type="embed">內嵌區塊</div>
<div class="tool" draggable="true" data-type="footer">頁尾區塊</div>
<hr>
<h3>頁面設定</h3>
<label>整頁背景顏色</label><input type="color" id="pageBg" value="#ffffff">
<label>頁面背景圖片</label><input type="file" id="pageBgFile" accept="image/*">
<label>背景尺寸</label><select id="bgSize"><option value="cover">填滿 cover</option><option value="contain">完整 contain</option><option value="auto">原始 auto</option></select>
<label>背景重複</label><select id="bgRepeat"><option value="no-repeat">不重複</option><option value="repeat">重複</option><option value="repeat-x">橫向重複</option><option value="repeat-y">縱向重複</option></select>
<label>背景位置</label><select id="bgPosition"><option value="center">置中</option><option value="top center">上中</option><option value="bottom center">下中</option><option value="left center">左中</option><option value="right center">右中</option></select>
<button onclick="exportZip()">匯出 ZIP</button>
<p class="hint">圖片上傳後會一起放進 ZIP 的 assets 資料夾。</p>
</aside>
<main class="stage">
<div class="device-buttons"><button onclick="setDevice('mobile')">手機</button><button onclick="setDevice('tablet')">平板</button><button onclick="setDevice('desktop')">800桌面</button></div>
<section id="canvas" class="canvas mobile">
<div id="headerArea" class="area headerArea" data-area="header"></div>
<div id="contentArea" class="area contentArea" data-area="content"></div>
<div id="footerArea" class="area footerArea" data-area="footer"></div>
</section>
</main>
<aside class="panel"><h2>區塊設定</h2><div id="settings">請先點選區塊</div></aside>
</div>
<script>
const canvas=document.getElementById('canvas'),headerArea=document.getElementById('headerArea'),contentArea=document.getElementById('contentArea'),footerArea=document.getElementById('footerArea'),settings=document.getElementById('settings');
let selected=null,counter=1;const assets=new Map();let pageBgAsset='';
document.querySelectorAll('.tool').forEach(t=>t.addEventListener('dragstart',e=>e.dataTransfer.setData('newType',t.dataset.type)));
[headerArea,contentArea,footerArea].forEach(a=>{a.addEventListener('dragover',e=>e.preventDefault());a.addEventListener('drop',dropHandler)});
function dropHandler(e){e.preventDefault();const type=e.dataTransfer.getData('newType');if(type){if(type==='header')addBlock(type,headerArea,true);else if(type==='footer')addBlock(type,footerArea,true);else addBlock(type,contentArea,false);return}const id=e.dataTransfer.getData('moveId'),b=document.getElementById(id);if(!b)return;const area=e.currentTarget;if(b.dataset.type==='header'&&area!==headerArea)return;if(b.dataset.type==='footer'&&area!==footerArea)return;if(['text','image','video','embed','blank'].includes(b.dataset.type)&&area!==contentArea)return;const after=getDragAfterElement(area,e.clientY);after?area.insertBefore(b,after):area.appendChild(b);refreshAll()}
function addBlock(type,area,single){if(single&&area.children.length){selectBlock(area.children[0]);return}const b=document.createElement('div');b.className='block';b.draggable=true;b.id='block-'+counter++;Object.assign(b.dataset,{type,text:defaultText(type),link:'',src:'',embed:'',alt:'',nav:'',asset:'',preview:'',alignX:'center',alignY:'center',contentOpacity:'1',bgColor:'#ffffff',bgOpacity:(type==='header'||type==='footer')?'0':'1',borderColor:'#999999',borderOpacity:(type==='header'||type==='footer')?'0':'1'});b.style.gridColumn=`span ${type==='header'||type==='footer'?8:8}`;b.style.gridRow=`span ${type==='header'||type==='footer'?2:4}`;b.style.borderRadius='0px';b.addEventListener('click',()=>selectBlock(b));b.addEventListener('dragstart',e=>{b.classList.add('dragging');e.dataTransfer.setData('moveId',b.id)});b.addEventListener('dragend',()=>b.classList.remove('dragging'));area.appendChild(b);renderBlock(b);selectBlock(b)}
function defaultText(t){return{header:'網站標題',text:'這是一段文字\n可以換行',blank:'',image:'圖片區塊',video:'影片區塊',embed:'內嵌區塊',footer:'頁尾文字'}[t]}
function renderBlock(b){const t=b.dataset.type,txt=b.dataset.text||'',link=b.dataset.link||'',src=b.dataset.src||'',emb=b.dataset.embed||'',alt=b.dataset.alt||'',viewSrc=b.dataset.preview||src;b.style.background=rgba(b.dataset.bgColor,b.dataset.bgOpacity);b.style.borderColor=rgba(b.dataset.borderColor,b.dataset.borderOpacity);b.style.justifyContent=justify(b.dataset.alignX);b.style.alignItems=align(b.dataset.alignY);let inner='';const contentStyle=`opacity:${b.dataset.contentOpacity};justify-content:${justify(b.dataset.alignX)};align-items:${align(b.dataset.alignY)}`;if(t==='header'){const nav=makeNav();inner=`<div class="content" style="${contentStyle}"><div><strong>${esc(txt)}</strong><div class="desktopNav nav">${nav}</div><details class="mobileNav"><summary>選單</summary><div class="nav">${nav}</div></details></div></div><span class="badge">頁首</span>`}if(t==='footer')inner=`<div class="content" style="${contentStyle}">${esc(txt)}</div><span class="badge">頁尾</span>`;if(t==='text')inner=`<div class="content" style="${contentStyle}">${link?`<a href="${esc(link)}" target="_blank">${esc(txt)}</a>`:esc(txt)}</div><span class="badge">文字</span>`;if(t==='image'){const img=viewSrc?`<img src="${esc(viewSrc)}" alt="${esc(alt)}">`:'請上傳圖片或輸入圖片 URL';inner=`<div class="content" style="${contentStyle}">${link?`<a href="${esc(link)}" target="_blank">${img}</a>`:img}</div><span class="badge">圖片</span>`}if(t==='blank')inner=`<div class="content" style="${contentStyle}"></div><span class="badge">空白</span>`;if(t==='video')inner=`<div class="content" style="opacity:${b.dataset.contentOpacity}">${src?`<video src="${esc(src)}" controls></video>`:'請輸入影片 URL'}</div><span class="badge">影片</span>`;if(t==='embed')inner=`<div class="content" style="opacity:${b.dataset.contentOpacity}">${emb||'請貼上 iframe / embed'}</div><span class="badge">內嵌</span>`;b.innerHTML=inner}
function makeNav(){return[...contentArea.children].filter(b=>b.dataset.nav).map(b=>`<a href="#${b.id}">${esc(b.dataset.nav)}</a>`).join('')}
function refreshAll(){[...headerArea.children,...contentArea.children,...footerArea.children].forEach(renderBlock)}
function selectBlock(b){document.querySelectorAll('.block').forEach(x=>x.classList.remove('selected'));selected=b;b.classList.add('selected');showSettings()}
function showSettings(){const b=selected,t=b.dataset.type;let h=`<b>類型：${typeName(t)}</b><hr>`;if(['text','image','video','embed'].includes(t))h+=`<label>頁首導航名稱</label><input data-bind="nav" value="${esc(b.dataset.nav)}" placeholder="例：社群、作品、關於我">`;if(t==='header')h+=`<label>頁首標題</label><input data-bind="text" value="${esc(b.dataset.text)}"><p class="hint">頁首導航會顯示有填「導航名稱」的內容區塊。</p>`;if(t==='footer')h+=`<label>頁尾文字</label><textarea data-bind="text">${esc(b.dataset.text)}</textarea>`;if(t==='text')h+=`<label>文字內容</label><textarea data-bind="text">${esc(b.dataset.text)}</textarea><label>超連結</label><input data-bind="link" value="${esc(b.dataset.link)}">`;if(t==='image')h+=`<label>上傳圖片</label><input type="file" id="imageUpload" accept="image/*"><label>圖片 URL</label><input data-bind="src" value="${esc(b.dataset.src)}"><label>圖片替代文字</label><input data-bind="alt" value="${esc(b.dataset.alt)}"><label>圖片超連結</label><input data-bind="link" value="${esc(b.dataset.link)}">`;if(t==='video')h+=`<label>影片 URL</label><input data-bind="src" value="${esc(b.dataset.src)}">`;if(t==='embed')h+=`<label>內嵌 HTML / iframe</label><textarea data-bind="embed">${esc(b.dataset.embed)}</textarea>`;if(t==='blank')h+=`<p class="hint">空白區塊只保留間距，可調整尺寸、背景、框線、透明度與圓角。</p>`;h+=`<hr><div class="row"><div><label>橫向 1-8</label><input type="number" min="1" max="8" data-style="col" value="${getSpan(b.style.gridColumn,8)}"></div><div><label>縱向 1-20</label><input type="number" min="1" max="20" data-style="row" value="${getSpan(b.style.gridRow,4)}"></div></div><label>九宮格對齊</label><div class="row"><select data-bind="alignX"><option value="flex-start">左</option><option value="center">中</option><option value="flex-end">右</option></select><select data-bind="alignY"><option value="flex-start">上</option><option value="center">中</option><option value="flex-end">下</option></select></div><label>文字顏色</label><input type="color" data-style="color" value="${rgbToHex(b.style.color)||'#111111'}"><label>文字尺寸</label><input type="number" data-style="fontSize" value="${parseInt(b.style.fontSize)||16}"><label>區塊背景顏色</label><input type="color" data-bind="bgColor" value="${b.dataset.bgColor}"><label>區塊背景透明度</label><input type="number" min="0" max="1" step="0.05" data-bind="bgOpacity" value="${b.dataset.bgOpacity}"><label>區塊框線顏色</label><input type="color" data-bind="borderColor" value="${b.dataset.borderColor}"><label>區塊框線透明度</label><input type="number" min="0" max="1" step="0.05" data-bind="borderOpacity" value="${b.dataset.borderOpacity}"><label>區塊內容透明度</label><input type="number" min="0" max="1" step="0.05" data-bind="contentOpacity" value="${b.dataset.contentOpacity}"><label>圓角 px</label><input type="number" min="0" max="80" data-style="radius" value="${parseInt(b.style.borderRadius)||0}"><div class="row"><button onclick="toggleStyle('fontWeight','bold','normal')">粗體</button><button onclick="toggleStyle('fontStyle','italic','normal')">斜體</button></div><div class="row"><button onclick="toggleUnderline()">底線</button><button onclick="toggleHighlight()">螢光網底</button></div><button onclick="deleteBlock()" style="background:#b33333">刪除區塊</button>`;settings.innerHTML=h;settings.querySelectorAll('[data-bind]').forEach(el=>{if(el.dataset.bind==='alignX')el.value=b.dataset.alignX;if(el.dataset.bind==='alignY')el.value=b.dataset.alignY;el.addEventListener('input',()=>{b.dataset[el.dataset.bind]=el.value;refreshAll();b.classList.add('selected')})});settings.querySelectorAll('[data-style]').forEach(el=>el.addEventListener('input',()=>applyStyle(el.dataset.style,el.value)));const up=document.getElementById('imageUpload');if(up)up.addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;const name=safeAssetName(f.name);assets.set(name,f);b.dataset.asset=name;b.dataset.preview=URL.createObjectURL(f);b.dataset.src='assets/'+name;refreshAll();showSettings()})}
function applyStyle(k,v){if(k==='col')selected.style.gridColumn=`span ${clamp(v,1,8)}`;else if(k==='row')selected.style.gridRow=`span ${clamp(v,1,20)}`;else if(k==='fontSize')selected.style.fontSize=v+'px';else if(k==='radius')selected.style.borderRadius=v+'px';else selected.style[k]=v;refreshAll();selected.classList.add('selected')}
function setDevice(m){canvas.className='canvas '+m}
document.getElementById('pageBg').oninput=e=>canvas.style.backgroundColor=e.target.value;document.getElementById('bgSize').oninput=e=>canvas.style.backgroundSize=e.target.value;document.getElementById('bgRepeat').oninput=e=>canvas.style.backgroundRepeat=e.target.value;document.getElementById('bgPosition').oninput=e=>canvas.style.backgroundPosition=e.target.value;document.getElementById('pageBgFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const name=safeAssetName(f.name);assets.set(name,f);pageBgAsset=name;canvas.dataset.bgAsset=name;canvas.style.backgroundImage=`url("${URL.createObjectURL(f)}")`};
async function exportZip(){const zip=new JSZip();const clone=canvas.cloneNode(true);clone.querySelectorAll('.selected,.dragging').forEach(x=>x.classList.remove('selected','dragging'));clone.querySelectorAll('.badge').forEach(x=>x.remove());if(clone.dataset.bgAsset){clone.style.backgroundImage=`url('assets/${clone.dataset.bgAsset}')`;}clone.querySelectorAll('[data-asset]').forEach(block=>{if(block.dataset.asset){block.querySelectorAll('img').forEach(img=>img.setAttribute('src','assets/'+block.dataset.asset));}});const html=`<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>我的網頁</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,'Noto Sans TC',sans-serif;background:#fff}.canvas{width:100%;max-width:800px;min-height:100vh;margin:auto;padding:12px;background-size:cover;background-position:center;background-repeat:no-repeat}.area{display:grid;grid-template-columns:repeat(8,1fr);grid-auto-rows:40px;gap:8px;padding:8px}.headerArea,.footerArea{background:transparent}.contentArea{min-height:520px}.block{position:relative;padding:8px;overflow:hidden;display:flex;white-space:pre-wrap;word-break:break-word;border-style:solid}.content{width:100%;height:100%;display:flex;white-space:pre-wrap;word-break:break-word}.content img,.content video,.content iframe{max-width:100%;max-height:100%;width:100%;height:100%;object-fit:cover;border:0}.nav a{margin:0 6px;color:inherit;text-decoration:underline}.mobileNav{display:none}.desktopNav{display:block}@media(max-width:600px){.canvas{max-width:430px}.desktopNav{display:none}.mobileNav{display:block}.mobileNav summary{cursor:pointer;padding:6px 10px;border:1px solid currentColor;border-radius:8px;display:inline-block}.mobileNav a{display:block;margin:8px 0}}</style></head><body>${clone.outerHTML}</body></html>`;zip.file('index.html',html);for(const [name,file] of assets)zip.file('assets/'+name,file);const blob=await zip.generateAsync({type:'blob'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='export-page.zip';a.click()}
function getDragAfterElement(c,y){return[...c.querySelectorAll('.block:not(.dragging)')].reduce((closest,child)=>{const box=child.getBoundingClientRect(),offset=y-box.top-box.height/2;return offset<0&&offset>closest.offset?{offset,element:child}:closest},{offset:-Infinity}).element}
function toggleStyle(p,on,off){selected.style[p]=selected.style[p]===on?off:on}function toggleUnderline(){selected.style.textDecoration=selected.style.textDecoration==='underline'?'none':'underline'}function toggleHighlight(){selected.style.backgroundImage=selected.style.backgroundImage?'':'linear-gradient(transparent 55%, #fff176 55%)'}function deleteBlock(){selected.remove();selected=null;settings.innerHTML='請先點選區塊';refreshAll()}function rgba(hex,a){const h=hex.replace('#','');const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);return`rgba(${r},${g},${b},${a})`}function justify(v){return v||'center'}function align(v){return v||'center'}function safeAssetName(n){return Date.now()+'-'+n.replace(/[^a-zA-Z0-9._-]/g,'_')}function typeName(t){return{header:'頁首區塊',footer:'頁尾區塊',text:'文字區塊',blank:'空白區塊',image:'圖片區塊',video:'影片區塊',embed:'內嵌區塊'}[t]}function clamp(v,min,max){return Math.min(max,Math.max(min,Number(v)||min))}function getSpan(v,d){const m=String(v).match(/span\s+(\d+)/);return m?m[1]:d}function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function rgbToHex(rgb){if(!rgb)return'#111111';if(rgb.startsWith('#'))return rgb;const m=rgb.match(/\d+/g);if(!m)return'#111111';return'#'+m.slice(0,3).map(x=>(+x).toString(16).padStart(2,'0')).join('')}
</script>
</body>
</html>
