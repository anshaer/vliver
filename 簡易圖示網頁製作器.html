<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,'Noto Sans TC',sans-serif;background:#202020;color:#eee}.editor{display:grid;grid-template-columns:230px 1fr 330px;height:100vh}.panel{background:#2e2e2e;padding:14px;overflow:auto}.tool{padding:12px;margin:8px 0;background:#444;border:1px solid #666;border-radius:10px;cursor:grab;text-align:center}.stage{padding:20px;overflow:auto;text-align:center}.device-buttons{display:flex;gap:8px;justify-content:center;margin-bottom:12px}.device-buttons button{width:auto}.canvas{margin:auto;width:100%;max-width:800px;min-height:760px;background:#fff;color:#111;border-radius:22px;padding:12px;box-shadow:0 0 0 8px #111;background-size:cover;background-position:center;background-repeat:no-repeat;transition:.2s}.canvas.mobile{max-width:430px}.canvas.tablet{max-width:768px}.canvas.desktop{max-width:800px}.area{display:grid;grid-template-columns:repeat(8,1fr);grid-auto-rows:40px;gap:8px;padding:8px}.headerArea,.footerArea{background:transparent}.contentArea{min-height:520px}.block{position:relative;padding:8px;border:2px solid rgba(153,153,153,1);background:rgba(255,255,255,1);overflow:hidden;cursor:move;display:flex;white-space:pre-wrap;word-break:break-word}.block.selected{outline:3px solid #1e90ff}.block.dragging{opacity:.45}.content{width:100%;height:100%;display:flex;white-space:pre-wrap;word-break:break-word}.content img,.content video,.content iframe{max-width:100%;max-height:100%;width:100%;height:100%;object-fit:cover;border:0}.imageBox{width:100%;height:100%;display:flex;align-items:center;justify-content:center}.imageBox img{width:100%;height:100%;object-fit:contain;background:transparent}.imageBox{width:100%;height:100%;display:flex;align-items:center;justify-content:center}.imageBox img{width:100%;height:100%;object-fit:contain;background:transparent}.badge{position:absolute;right:4px;bottom:3px;background:#0008;color:#fff;font-size:10px;padding:2px 5px;border-radius:4px;pointer-events:none}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}button,input,select,textarea{width:100%;padding:8px;margin:4px 0;border-radius:8px;border:1px solid #666;background:#1f1f1f;color:#fff}button{background:#3d6cff;border:0;cursor:pointer}textarea{min-height:90px}.nav a{margin:0 6px;color:inherit;text-decoration:underline}.headerLine{width:100%;display:flex;align-items:center;gap:10px;flex-wrap:nowrap}.headerTitle{flex:0 0 auto;white-space:nowrap}.headerNavWrap{flex:1 1 auto;min-width:0;display:flex;align-items:center}.headerLine.nav-left{justify-content:flex-start}.headerLine.nav-left .headerNavWrap{justify-content:flex-start}.headerLine.nav-right{justify-content:space-between}.headerLine.nav-right .headerNavWrap{justify-content:flex-end}.desktopNav{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.mobileNav{display:none}.desktopNav{display:block}input[type=color]{height:38px;padding:2px;background:transparent;border:1px solid #666;border-radius:8px}@media(max-width:600px){.desktopNav{display:none}.mobileNav{display:block}.mobileNav summary{cursor:pointer;padding:6px 10px;border:1px solid currentColor;border-radius:8px;display:inline-block}.mobileNav a{display:block;margin:8px 0}}.canvas.mobile .desktopNav{display:none}.canvas.mobile .mobileNav{display:block}.canvas.mobile .mobileNav summary{cursor:pointer;padding:6px 10px;border:1px solid currentColor;border-radius:8px;display:inline-block}.canvas.mobile .mobileNav a{display:block;margin:8px 0}.canvas.mobile .mobileNav{width:auto;text-align:left;flex:0 0 auto}.canvas.mobile .mobileNav.nav-right{text-align:right}.canvas.mobile .mobileNav summary{white-space:nowrap}
.navBlock{overflow:visible;z-index:20}
.navBlock .content{overflow:visible}
.navMenu{width:100%;height:100%;display:flex;align-items:center;gap:8px;position:relative}
.navMenu.left{justify-content:flex-start}.navMenu.center{justify-content:center}.navMenu.right{justify-content:flex-end}
.navInline{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.navDropdown{position:relative;z-index:50}.navDropdown summary{cursor:pointer;list-style:none;padding:6px 10px;border:1px solid currentColor;border-radius:8px;display:inline-block;white-space:nowrap}.navDropdown summary::-webkit-details-marker{display:none}
.navDropdown[open]{z-index:9999}.navDropdown[open] .navMenuList{position:absolute;top:calc(100% + 6px);min-width:160px;background:rgba(255,255,255,.96);color:#111;border:1px solid #ccc;border-radius:10px;box-shadow:0 8px 24px #0004;padding:8px;white-space:nowrap}.navDropdown.right .navMenuList{right:0}.navDropdown.left .navMenuList{left:0}.navDropdown.center .navMenuList{left:50%;transform:translateX(-50%)}
.navDropdown .navMenuList a{display:block;margin:6px 0;color:inherit}
label{display:block;margin-top:9px;font-size:13px}hr{border:0;border-top:1px solid #555;margin:14px 0}.hint{font-size:12px;color:#bbb;line-height:1.5}
.navBlock{overflow:visible;z-index:20}.navBlock .content{overflow:visible}.navMenu{width:100%;height:100%;display:flex;align-items:center;gap:8px;position:relative}.navMenu.left{justify-content:flex-start}.navMenu.center{justify-content:center}.navMenu.right{justify-content:flex-end}.navInline{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.navDropdown{position:relative;z-index:50}.navDropdown summary{cursor:pointer;list-style:none;padding:6px 10px;border:1px solid currentColor;border-radius:8px;display:inline-block;white-space:nowrap}.navDropdown summary::-webkit-details-marker{display:none}.navDropdown[open]{z-index:9999}.navDropdown[open] .navMenuList{position:absolute;top:calc(100% + 6px);min-width:160px;background:rgba(255,255,255,.96);color:#111;border:1px solid #ccc;border-radius:10px;box-shadow:0 8px 24px #0004;padding:8px;white-space:nowrap}.navDropdown.right .navMenuList{right:0}.navDropdown.left .navMenuList{left:0}.navDropdown.center .navMenuList{left:50%;transform:translateX(-50%)}.navDropdown .navMenuList a{display:block;margin:6px 0;color:inherit}.socialImageCard{width:100%;height:100%;display:grid;grid-template-rows:1fr auto;overflow:hidden;border:1px solid #ddd;border-radius:14px;background:#fff;color:#111;text-decoration:none}

.socialImageCard .pic img{width:100%;height:100%;object-fit:cover;display:block}
.socialImageCard .meta{display:flex;gap:8px;align-items:center;padding:8px 10px;font-size:12px;line-height:1.25;background:#ffffffe8;color:#111}
.socialImageCard .logo{width:28px;height:28px;border-radius:999px;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;flex:0 0 auto;font-size:14px}
.socialImageCard .metaText{min-width:0}.socialImageCard .title{font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.socialImageCard .small{opacity:.72;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.carouselBox{width:100%;height:100%;position:relative;overflow:hidden;border-radius:inherit;background:transparent}
.carouselBox img{width:100%;height:100%;object-fit:contain;display:none;background:transparent}

.carouselDots{position:absolute;left:0;right:0;bottom:6px;display:flex;justify-content:center;gap:4px;pointer-events:none}
.carouselDots span{width:6px;height:6px;border-radius:50%;background:#fff9;border:1px solid #0004}.carouselManage{display:grid;gap:8px;margin-top:8px}.carouselItem{display:grid;grid-template-columns:54px 1fr 64px;gap:8px;align-items:center;background:#1f1f1f;border:1px solid #555;border-radius:8px;padding:6px}.carouselItem img{width:54px;height:38px;object-fit:contain;background:#fff;border-radius:4px}.carouselItem span{font-size:12px;color:#ddd}.carouselItem button{margin:0;padding:6px;background:#b33333}
.tableBox{width:100%;height:100%;overflow:auto}
.tableBox table{width:100%;border-collapse:collapse;font-size:inherit;color:inherit;background:transparent}
.tableBox th,.tableBox td{border:1px solid currentColor;padding:6px;white-space:pre-wrap;word-break:break-word}
.tableBox th{font-weight:bold;background:rgba(0,0,0,.06)}
</style>
</head>
<body>
<div class="editor">
<aside class="panel">
<h2>區塊</h2>
<div class="tool" draggable="true" data-type="header">頁首區塊</div>
<div class="tool" draggable="true" data-type="nav">導航區塊</div>
<div class="tool" draggable="true" data-type="text">文字區塊</div>
<div class="tool" draggable="true" data-type="blank">空白區塊</div>
<div class="tool" draggable="true" data-type="image">圖片區塊</div>
<div class="tool" draggable="true" data-type="carousel">圖片輪播區塊</div>
<div class="tool" draggable="true" data-type="video">影片區塊</div>
<div class="tool" draggable="true" data-type="social">社群區塊</div>
<div class="tool" draggable="true" data-type="embed">自訂嵌入區塊</div>
<div class="tool" draggable="true" data-type="table">表格區塊</div>
<div class="tool" draggable="true" data-type="footer">頁尾區塊</div>
<hr>
<h3>頁面設定</h3>
<label>整頁背景顏色</label><input type="color" id="pageBg" value="#ffffff">
<label>頁面背景圖片</label><input type="file" id="pageBgFile" accept="image/*">
<label>背景尺寸</label><select id="bgSize"><option value="cover">填滿 cover</option><option value="contain">完整 contain</option><option value="auto">原始 auto</option></select>
<label>背景重複</label><select id="bgRepeat"><option value="no-repeat">不重複</option><option value="repeat">重複</option><option value="repeat-x">橫向重複</option><option value="repeat-y">縱向重複</option></select>
<label>背景位置</label><select id="bgPosition"><option value="center">置中</option><option value="top center">上中</option><option value="bottom center">下中</option><option value="left center">左中</option><option value="right center">右中</option></select>
<button onclick="exportZip()">匯出 ZIP</button>
<p class="hint">圖片上傳後會一起放進 ZIP 的 assets 資料夾。</p>
</aside>
<main class="stage">
<div class="device-buttons"><button onclick="setDevice('mobile')">手機</button><button onclick="setDevice('tablet')">平板</button><button onclick="setDevice('desktop')">800桌面</button></div>
<section id="canvas" class="canvas mobile">
<div id="headerArea" class="area headerArea" data-area="header"></div>
<div id="contentArea" class="area contentArea" data-area="content"></div>
<div id="footerArea" class="area footerArea" data-area="footer"></div>
</section>
</main>
<aside class="panel"><h2>區塊設定</h2><div id="settings">請先點選區塊</div></aside>
</div>
<script>
const canvas=document.getElementById('canvas'),headerArea=document.getElementById('headerArea'),contentArea=document.getElementById('contentArea'),footerArea=document.getElementById('footerArea'),settings=document.getElementById('settings');
let selected=null,counter=1;const assets=new Map();let pageBgAsset='';
document.querySelectorAll('.tool').forEach(t=>t.addEventListener('dragstart',e=>e.dataTransfer.setData('newType',t.dataset.type)));
[headerArea,contentArea,footerArea].forEach(a=>{a.addEventListener('dragover',e=>e.preventDefault());a.addEventListener('drop',dropHandler)});
function dropHandler(e){e.preventDefault();const type=e.dataTransfer.getData('newType');if(type){if(type==='header')addBlock(type,headerArea,true);else if(type==='nav')addBlock(type,headerArea,false);else if(type==='footer')addBlock(type,footerArea,true);else addBlock(type,contentArea,false);return}const id=e.dataTransfer.getData('moveId'),b=document.getElementById(id);if(!b)return;const area=e.currentTarget;if(b.dataset.type==='header'&&area!==headerArea)return;if(b.dataset.type==='footer'&&area!==footerArea)return;if(['text','image','video','social','embed','blank','carousel','table'].includes(b.dataset.type)&&area!==contentArea)return;if(b.dataset.type==='nav'&&![headerArea,contentArea].includes(area))return;const after=getDragAfterElement(area,e.clientY);after?area.insertBefore(b,after):area.appendChild(b);refreshAll()}
function addBlock(type,area,single){if(single&&area.children.length){selectBlock(area.children[0]);return}const b=document.createElement('div');b.className='block';b.draggable=true;b.id='block-'+counter++;Object.assign(b.dataset,{type,text:defaultText(type),link:'',src:'',embed:'',alt:'',nav:'',asset:'',preview:'',socialUrl:'',socialPlatform:'auto',socialMode:'official',socialTitle:'',socialSmall:'',socialImage:'',socialImageAsset:'',socialImagePreview:'',carouselImages:'',carouselAssets:'',carouselInterval:'3',tableRows:'3',tableCols:'3',tableHeader:'1',tableData:'',mobileNavSide:'left',navDropdown:'1',navLabel:'選單',alignX:'center',alignY:'center',contentOpacity:'1',bgColor:'#ffffff',bgOpacity:(type==='header'||type==='footer')?'0':'1',borderColor:'#999999',borderOpacity:(type==='header'||type==='footer')?'0':'1'});b.style.gridColumn=`span ${type==='header'||type==='footer'?8:8}`;b.style.gridRow=`span ${type==='header'||type==='footer'?2:4}`;b.style.borderRadius='0px';b.addEventListener('click',()=>selectBlock(b));b.addEventListener('dragstart',e=>{b.classList.add('dragging');e.dataTransfer.setData('moveId',b.id)});b.addEventListener('dragend',()=>b.classList.remove('dragging'));area.appendChild(b);renderBlock(b);selectBlock(b)}
function defaultText(t){return{header:'網站標題',nav:'導航',text:'這是一段文字\n可以換行',blank:'',image:'圖片區塊',video:'影片區塊',embed:'自訂嵌入區塊',social:'社群區塊',carousel:'圖片輪播區塊',table:'表格區塊',footer:'頁尾文字'}[t]}
function renderBlock(b){const t=b.dataset.type,txt=b.dataset.text||'',link=b.dataset.link||'',src=b.dataset.src||'',emb=b.dataset.embed||'',alt=b.dataset.alt||'',viewSrc=b.dataset.preview||src;b.style.background=rgba(b.dataset.bgColor,b.dataset.bgOpacity);b.style.borderColor=rgba(b.dataset.borderColor,b.dataset.borderOpacity);b.style.justifyContent=justify(b.dataset.alignX);b.style.alignItems=align(b.dataset.alignY);b.classList.toggle('navBlock',t==='nav');let inner='';const contentStyle=`opacity:${b.dataset.contentOpacity};justify-content:${justify(b.dataset.alignX)};align-items:${align(b.dataset.alignY)}`;if(t==='header'){inner=`<div class="content" style="${contentStyle}"><strong class="headerTitle">${esc(txt)}</strong></div><span class="badge">頁首</span>`}if(t==='nav'){inner=`<div class="content" style="${contentStyle}">${renderNavBlock(b)}</div><span class="badge">導航</span>`}if(t==='footer')inner=`<div class="content" style="${contentStyle}">${esc(txt)}</div><span class="badge">頁尾</span>`;if(t==='text')inner=`<div class="content" style="${contentStyle}">${link?`<a href="${esc(link)}" target="_blank">${esc(txt)}</a>`:esc(txt)}</div><span class="badge">文字</span>`;if(t==='image'){const img=viewSrc?`<span class="imageBox"><img src="${esc(viewSrc)}" alt="${esc(alt)}"></span>`:'請上傳圖片或輸入圖片 URL';inner=`<div class="content" style="${contentStyle}">${link?`<a class="imageBox" href="${esc(link)}" target="_blank">${img}</a>`:img}</div><span class="badge">圖片</span>`}if(t==='carousel')inner=`<div class="content" style="opacity:${b.dataset.contentOpacity}">${renderCarousel(b)}</div><span class="badge">輪播</span>`;if(t==='table')inner=`<div class="content" style="${contentStyle}">${renderTable(b)}</div><span class="badge">表格</span>`;if(t==='blank')inner=`<div class="content" style="${contentStyle}"></div><span class="badge">空白</span>`;if(t==='video')inner=`<div class="content" style="opacity:${b.dataset.contentOpacity}">${renderVideo(src)}</div><span class="badge">影片</span>`;if(t==='social')inner=`<div class="content" style="${contentStyle}">${renderSocial(b.dataset.socialUrl||src,b.dataset.socialPlatform,b.dataset.socialMode,b)}</div><span class="badge">社群</span>`;if(t==='embed')inner=`<div class="content" style="opacity:${b.dataset.contentOpacity}">${emb||'請貼上 iframe / embed'}</div><span class="badge">嵌入</span>`;b.innerHTML=inner;queueSocialScripts()}function makeNav(){return[...contentArea.children].filter(b=>b.dataset.nav).map(b=>`<a href="#${b.id}">${esc(b.dataset.nav)}</a>`).join('')}
function refreshAll(){[...headerArea.children,...contentArea.children,...footerArea.children].forEach(renderBlock)}
function selectBlock(b){document.querySelectorAll('.block').forEach(x=>x.classList.remove('selected'));selected=b;b.classList.add('selected');showSettings()}
function showSettings(){const b=selected,t=b.dataset.type;let h=`<b>類型：${typeName(t)}</b><hr>`;if(['text','image','video','social','embed','carousel','table','nav'].includes(t))h+=`<label>頁首導航名稱</label><input data-bind="nav" value="${esc(b.dataset.nav)}" placeholder="例：社群、作品、關於我">`;if(t==='header')h+=`<label>頁首標題</label><input data-bind="text" value="${esc(b.dataset.text)}"><p class="hint">頁首只放標題。導航請使用獨立的「導航區塊」。</p>`;if(t==='nav')h+=`<label>下拉選單</label><select data-bind="navDropdown"><option value="1">啟用</option><option value="0">停用，直接橫向顯示</option></select><label>選單文字</label><input data-bind="navLabel" value="${esc(b.dataset.navLabel||'選單')}"><label>選單位置</label><select data-bind="mobileNavSide"><option value="left">靠左</option><option value="center">置中</option><option value="right">靠右</option></select><p class="hint">導航會顯示有填「頁首導航名稱」的內容區塊。下拉展開時會暫時覆蓋其他區塊。</p>`;if(t==='footer')h+=`<label>頁尾文字</label><textarea data-bind="text">${esc(b.dataset.text)}</textarea>`;if(t==='text')h+=`<label>文字內容</label><textarea data-bind="text">${esc(b.dataset.text)}</textarea><label>超連結</label><input data-bind="link" value="${esc(b.dataset.link)}">`;if(t==='image')h+=`<label>上傳圖片</label><input type="file" id="imageUpload" accept="image/*"><label>圖片 URL</label><input data-bind="src" value="${esc(b.dataset.src)}"><label>圖片替代文字</label><input data-bind="alt" value="${esc(b.dataset.alt)}"><label>圖片超連結</label><input data-bind="link" value="${esc(b.dataset.link)}">`;if(t==='video')h+=`<label>影片 URL / YouTube / Twitch</label><input data-bind="src" value="${esc(b.dataset.src)}" placeholder="mp4、webm、YouTube、Twitch 直播/VOD"><p class="hint">影片區塊專門處理影片播放：本機影片 URL、YouTube、Twitch 直播/VOD。社群貼文請用「社群區塊」。</p>`;if(t==='social')h+=`<label>平台</label><select data-bind="socialPlatform"><option value="auto">自動判斷</option><option value="x">X / Twitter</option><option value="instagram">Instagram</option><option value="facebook">Facebook</option><option value="youtube">YouTube</option><option value="twitch">Twitch</option><option value="tiktok">TikTok</option><option value="threads">Threads</option><option value="vroid">VRoid Hub</option></select><label>顯示方式</label><select data-bind="socialMode"><option value="official">官方嵌入</option><option value="imagecard">圖片連結卡</option><option value="card">精簡卡片</option><option value="button">Logo 按鈕</option><option value="text">純文字</option></select><label>社群網址</label><input data-bind="socialUrl" value="${esc(b.dataset.socialUrl||b.dataset.src)}" placeholder="貼上 X / IG / FB / YT / Twitch / TikTok / Threads / VRoid Hub 網址"><label>圖片連結卡標題</label><input data-bind="socialTitle" value="${esc(b.dataset.socialTitle)}" placeholder="例：最新貼文、社群公告、作品展示"><label>小連結文字</label><input data-bind="socialSmall" value="${esc(b.dataset.socialSmall)}" placeholder="例：點擊前往、在 YouTube 查看、開啟貼文"><label>圖片連結卡圖片</label><input type="file" id="socialImageUpload" accept="image/*"><label>圖片 URL</label><input data-bind="socialImage" value="${esc(b.dataset.socialImage)}" placeholder="可填圖片網址，或上傳圖片"><p class="hint">授權或官方嵌入不穩的平台，建議改用「圖片連結卡」：圖片 + 平台 Logo + 小連結文字，點擊整張卡開啟原網址。</p>`;if(t==='carousel')h+=`<label>上傳輪播圖片（可多選）</label><input type="file" id="carouselUpload" accept="image/*" multiple><label>圖片 URL 清單（一行一張）</label><textarea data-bind="carouselImages" placeholder="https://.../1.jpg\nhttps://.../2.jpg">${esc(b.dataset.carouselImages)}</textarea><label>輪播秒數</label><input type="number" min="1" max="60" data-bind="carouselInterval" value="${esc(b.dataset.carouselInterval||'3')}"><p class="hint">可重複上傳，新圖片會合併到現有輪播。下方可刪除單一張。</p>${carouselManagerHTML(b)}`;if(t==='table')h+=`<div class="row"><div><label>列數</label><input type="number" min="1" max="50" data-bind="tableRows" value="${esc(b.dataset.tableRows||'3')}"></div><div><label>欄數</label><input type="number" min="1" max="12" data-bind="tableCols" value="${esc(b.dataset.tableCols||'3')}"></div></div><label>第一列作為標題</label><select data-bind="tableHeader"><option value="1">是</option><option value="0">否</option></select><label>表格內容：每列一行，欄位用 | ntWeight','bold','normal')">粗體</button><button onclick="toggleStyle('fontStyle','italic','normal')">斜體</button></div><div class="row"><button onclick="toggleUnderline()">底線</button><button onclick="toggleHighlight()">螢光網底</button></div><button onclick="deleteBlock()" style="background:#b33333">刪除區塊</button>`;settings.innerHTML=h;settings.querySelectorAll('[data-bind]').forEach(el=>{if(el.dataset.bind==='alignX')el.value=b.dataset.alignX;if(el.dataset.bind==='alignY')el.value=b.dataset.alignY;if(el.dataset.bind==='mobileNavSide')el.value=b.dataset.mobileNavSide||'left';if(el.dataset.bind==='navDropdown')el.value=b.dataset.navDropdown||'1';if(el.dataset.bind==='tableHeader')el.value=b.dataset.tableHeader||'1';if(el.dataset.bind==='socialPlatform')el.value=b.dataset.socialPlatform||'auto';if(el.dataset.bind==='socialMode')el.value=b.dataset.socialMode||'official';el.addEventListener('input',()=>{b.dataset[el.dataset.bind]=el.value;if(el.dataset.bind==='socialUrl')b.dataset.src=el.value;refreshAll();b.classList.add('selected')})});settings.querySelectorAll('[data-style]').forEach(el=>el.addEventListener('input',()=>applyStyle(el.dataset.style,el.value)));const up=document.getElementById('imageUpload');if(up)up.addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;const name=safeAssetName(f.name);assets.set(name,f);b.dataset.asset=name;b.dataset.preview=URL.createObjectURL(f);b.dataset.src='assets/'+name;refreshAll();showSettings()});const sup=document.getElementById('socialImageUpload');if(sup)sup.addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;const name=safeAssetName(f.name);assets.set(name,f);b.dataset.socialImageAsset=name;b.dataset.socialImagePreview=URL.createObjectURL(f);b.dataset.socialImage='assets/'+name;refreshAll();showSettings()});const cup=document.getElementById('carouselUpload');if(cup)cup.addEventListener('change',async e=>{const files=[...e.target.files];if(!files.length)return;const oldNames=(b.dataset.carouselAssets||'').split('|').filter(Boolean);const oldPreviews=(b.dataset.carouselPreviews||'').split('|').filter(Boolean);const oldImgs=(b.dataset.carouselImages||'').split(/\n+/).map(x=>x.trim()).filter(Boolean);const names=[...oldNames],previews=[...oldPreviews],imgs=[...oldImgs];files.forEach(f=>{const name=safeAssetName(f.name);assets.set(name,f);names.push(name);previews.push(URL.createObjectURL(f));imgs.push('assets/'+name);});b.dataset.carouselAssets=names.join('|');b.dataset.carouselPreviews=previews.join('|');b.dataset.carouselImages=imgs.join('\n');refreshAll();showSettings()});settings.querySelectorAll('[data-carousel-del]').forEach(btn=>btn.addEventListener('click',()=>{deleteCarouselImage(b,Number(btn.dataset.carouselDel));refreshAll();showSettings()}));}function carouselManagerHTML(b){const previews=(b.dataset.carouselPreviews||'').split('|').filter(Boolean);const imgs=(b.dataset.carouselImages||'').split(/\n+/).map(x=>x.trim()).filter(Boolean);const list=previews.length?previews:imgs;if(!list.length)return '<p class="hint">目前沒有輪播圖片。</p>';return '<div class="carouselManage">'+list.map((src,i)=>`<div class="carouselItem"><img src="${esc(src)}" alt="slide ${i+1}"><span>第 ${i+1} 張</span><button type="button" data-carousel-del="${i}">刪除</button></div>`).join('')+'</div>';}function deleteCarouselImage(b,i){const names=(b.dataset.carouselAssets||'').split('|').filter(Boolean);const previews=(b.dataset.carouselPreviews||'').split('|').filter(Boolean);const imgs=(b.dataset.carouselImages||'').split(/\n+/).map(x=>x.trim()).filter(Boolean);if(names[i])assets.delete(names[i]);names.splice(i,1);previews.splice(i,1);imgs.splice(i,1);b.dataset.carouselAssets=names.join('|');b.dataset.carouselPreviews=previews.join('|');b.dataset.carouselImages=imgs.join('\n');}function applyStyle(k,v){if(k==='col')selected.style.gridColumn=`span ${clamp(v,1,8)}`;else if(k==='row')selected.style.gridRow=`span ${clamp(v,1,20)}`;else if(k==='fontSize')selected.style.fontSize=v+'px';e function detectPlatform(url,selected){if(selected&&selected!=='auto')return selected;url=String(url||'').toLowerCase();if(url.includes('instagram.com'))return 'instagram';if(url.includes('twitter.com')||url.includes('x.com'))return 'x';if(url.includes('facebook.com')||url.includes('fb.watch'))return 'facebook';if(url.includes('youtube.com')||url.includes('youtu.be'))return 'youtube';if(url.includes('twitch.tv'))return 'twitch';if(url.includes('tiktok.com'))return 'tiktok';if(url.includes('threads.net'))return 'threads';if(url.includes('hub.vroid.com'))return 'vroid';return 'link'}


function renderNavBlock(b){
  const nav=makeNav()||'<span class="hint">尚未設定導航名稱</span>';
  const side=b.dataset.mobileNavSide||'left';
  const label=esc(b.dataset.navLabel||'選單');
  if(b.dataset.navDropdown==='0')return `<div class="navMenu ${side}"><div class="navInline nav">${nav}</div></div>`;
  return `<div class="navMenu ${side}"><details class="navDropdown ${side}"><summary>${label}</summary><div class="navMenuList nav">${nav}</div></details></div>`;
}

function renderCarousel(b){
  const previews=(b.dataset.carouselPreviews||'').split('|').filter(Boolean);
  const imgs=(b.dataset.carouselImages||'').split(/\n+/).map(x=>x.trim()).filter(Boolean);
  const list=previews.length?previews:imgs;
  if(!list.length)return '<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:#777">請上傳輪播圖片或輸入圖片 URL 清單</div>';
  const id='car-'+b.id;
  const sec=Math.max(1,Number(b.dataset.carouselInterval||3));
  const html=list.map((src,i)=>`<img class="${i===0?'active':''}" src="${esc(src)}" alt="slide ${i+1}">`).join('')+`<div class="carouselDots">${list.map(()=>'<span></span>').join('')}</div>`;
  setTimeout(()=>startCarousel(id,sec),0);
  return `<div id="${id}" class="carouselBox" data-sec="${sec}">${html}</div>`;
}
function startCarousel(id,sec){
  const box=document.getElementById(id); if(!box||box.dataset.started)return; box.dataset.started='1';
  const imgs=[...box.querySelectorAll('img')]; if(imgs.length<2)return; let i=0;
  setInterval(()=>{imgs[i].classList.remove('active');i=(i+1)%imgs.length;imgs[i].classList.add('active');},sec*1000);
}
function renderTable(b){
  const rows=Math.max(1,Math.min(50,Number(b.dataset.tableRows||3)));
  const cols=Math.max(1,Math.min(12,Number(b.dataset.tableCols||3)));
  const data=String(b.dataset.tableData||'').split(/\n/).map(r=>r.split('|').map(c=>c.trim()));
  let out='<div class="tableBox"><table>';
  for(let r=0;r<rows;r++){
    out+='<tr>';
    for(let c=0;c<cols;c++){
      const tag=(b.dataset.tableHeader!=='0'&&r===0)?'th':'td';
      out+=`<${tag}>${esc((data[r]&&data[r][c])||'')}</${tag}>`;
    }
    out+='</tr>';
  }
  return out+'</table></div>';
}
function getYouTubeId(url){const s=String(url||'');let m=s.match(/[?&]v=([^&]+)/);if(m)return m[1];m=s.match(/youtu\.be\/([^?&/]+)/);if(m)return m[1];m=s.match(/youtube\.com\/shorts\/([^?&/]+)/);return m?m[1]:''}
function isYouTubeVideoUrl(url){const u=String(url||'');return /youtu\.be\/[^?&/]+/.test(u)||/[?&]v=([^&]+)/.test(u)||/youtube\.com\/shorts\/[^?&/]+/.test(u)||/youtube\.com\/embed\/[^?&/]+/.test(u)}
function isYouTubeCommunityUrl(url){const u=String(url||'').toLowerCase();return u.includes('/post/')||u.includes('/community')||u.includes('/channel/')||u.includes('/@')&&!isYouTubeVideoUrl(url)}
function renderVideo(url){if(!url)return '請輸入影片 URL';const u=String(url);const yt=getYouTubeId(u);if(yt&&isYouTubeVideoUrl(u))return `<iframe src="https://www.youtube.com/embed/${esc(yt)}" allowfullscreen></iframe>`;if(u.includes('twitch.tv')){const ch=(u.match(/twitch\.tv\/([^/?]+)/)||[])[1]||'';return `<iframe src="https://player.twitch.tv/?channel=${esc(ch)}&parent=${location.hostname||'localhost'}" allowfullscreen></iframe>`}return `<video src="${esc(u)}" controls></video>`}
function platformLogo(p,label){return ({instagram:'IG',x:'X',facebook:'f',youtube:'▶',twitch:'T',tiktok:'♪',threads:'@',vroid:'VR',link:'↗'}[p]||String(label||'S').slice(0,2))}
function socialImageCard(label,u,b,p){const img=b.dataset.socialImagePreview||b.dataset.socialImage||'';const title=b.dataset.socialTitle||label;const small=b.dataset.socialSmall||'點擊開啟連結';const logo=platformLogo(p,label);const pic=img?`<img src="${esc(img)}" alt="${esc(title)}">`:`<span style="font-size:13px;color:#777">請上傳圖片或填圖片 URL</span>`;return `<a class="socialImageCard" href="${u}" target="_blank"><div class="pic">${pic}</div><div class="meta"><span class="logo">${esc(logo)}</span><span class="metaText"><div class="title">${esc(title)}</div><div class="small">${esc(small)}</div></span></div></a>`}

function renderSocial(url,platform,mode,b){if(!url)return '請貼上社群網址';const p=detectPlatform(url,platform),u=esc(url),raw=String(url),label={instagram:'Instagram',x:'X',facebook:'Facebook',youtube:'YouTube',twitch:'Twitch',tiktok:'TikTok',threads:'Threads',vroid:'VRoid Hub',link:'連結'}[p]||'社群';if(mode==='text')return `<a href="${u}" target="_blank">${u}</a>`;if(mode==='imagecard')return socialImageCard(label,u,b,p);if(mode==='button')return `<a href="${u}" target="_blank" style="display:inline-flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:24px;text-decoration:none;color:inherit;border:2px solid currentColor;border-radius:16px">${label}</a>`;if(mode==='card')return socialCard(label,u,u);if(p==='youtube'){if(isYouTubeVideoUrl(raw)){return renderVideo(raw)}return socialCard('YouTube 社群貼文',u,'YouTube 社群貼文沒有穩定官方嵌入；點擊開啟貼文。')}
if(p==='twitch')return renderVideo(raw);if(p==='instagram')return `<blockquote class="instagram-media" data-instgrm-permalink="${u}" data-instgrm-version="14" style="background:#fff;border:1px solid #ddd;border-radius:8px;margin:0;min-width:220px;width:100%;height:100%"><a href="${u}" target="_blank">在 Instagram 查看</a></blockquote>`;if(p==='x')return `<blockquote class="twitter-tweet"><a href="${u}">在 X 查看</a></blockquote>`;if(p==='tiktok')return `<blockquote class="tiktok-embed" cite="${u}" data-video-id="" style="max-width:605px;min-width:220px"><a href="${u}">在 TikTok 查看</a></blockquote>`;if(p==='facebook'){if(/facebook\.com\/share\//i.test(raw)||/fb\.watch/i.test(raw))return socialCard('Facebook',u,'Facebook 分享短連結/隱私貼文常無法嵌入；點擊開啟。');return `<iframe src="https://www.facebook.com/plugins/post.php?href=${encodeURIComponent(raw)}&show_text=true&width=500" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true"></iframe>`}if(p==='threads')return socialCard('Threads',u,'Threads 目前以連結卡片顯示。');if(p==='vroid')return socialCard('VRoid Hub',u,'VRoid Hub 以連結卡片顯示。');return `<a href="${u}" target="_blank" style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:inherit">${label}</a>`}
let socialTimer=null;function queueSocialScripts(){clearTimeout(socialTimer);socialTimer=setTimeout(()=>{if(document.querySelector('.instagram-media'))loadScript('https://www.instagram.com/embed.js',()=>window.instgrm&&window.instgrm.Embeds&&window.instgrm.Embeds.process());if(document.querySelector('.twitter-tweet'))loadScript('https://platform.twitter.com/widgets.js',()=>window.twttr&&window.twttr.widgets&&window.twttr.widgets.load());if(document.querySelector('.tiktok-embed'))loadScript('https://www.tiktok.com/embed.js');},200)}
