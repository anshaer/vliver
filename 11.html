<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LITEMIX v0.9.2 β 5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-main: #0a0e14;       
            --bg-panel: #111820;      
            --bg-toolbar: #1a222e;    
            --border-color: #3b4d61;  
            
            --text-main: #d1d8e0;     
            --text-muted: #7b8c9e;    
            
            --track-bg: #161e29;      
            --clip-bg: rgba(65, 160, 255, 0.15); 
            --clip-border: #41a0ff;   
            
            --wave-color: #41a0ff;    
            --wave-progress: #82c4ff;
            
            --accent-play: #48c790;   
            --accent-pause: #ffcf54;  
            
            --vol-color: #48c790;     
            --pan-color: #ff6b8b;     
            --btn-mute: #ff4757;      
            --btn-solo: #1e90ff;      
        }
        
        ::-webkit-scrollbar { width: 12px; height: 12px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 6px; border: 3px solid var(--bg-main); }
        ::-webkit-scrollbar-thumb:hover { background: #5c7793; }

        html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; overflow: hidden; overscroll-behavior: none; }

        .toolbar { background-color: var(--bg-toolbar); padding: 8px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color); z-index: 50; flex-wrap: wrap; gap: 10px; flex-shrink: 0; }
        .toolbar-group { display: flex; align-items: center; gap: 8px; }
        h1 { margin: 0; font-size: 16px; color: var(--text-main); font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        input[type="file"] { display: none; }
        
        .btn { background-color: #232f3e; color: #fff; border: 1px solid #3b4d61; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .btn:hover:not(:disabled) { background-color: #3b4d61; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .btn-primary { background-color: var(--clip-border); color: #000; border: none; }
        .btn-primary:hover:not(:disabled) { background-color: var(--wave-progress); }
        
        .btn-play { background-color: var(--accent-play); color: #000; border: none; }
        .btn-pause { background-color: var(--accent-pause); color: #000; border: none; }
        .btn-danger { background-color: var(--btn-mute); color: #fff; border: none; }
        
        .control-group { display: flex; align-items: center; background: rgba(0,0,0,0.3); border-radius: 4px; border: 1px solid var(--border-color); padding: 5px 10px; font-size: 13px; gap: 5px;}
        .control-group input[type="number"] { width: 55px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #555; border-radius: 2px; text-align: center; font-family: monospace; font-size: 13px;}
        .control-group select { background: transparent; color: #fff; border: none; outline: none; cursor: pointer; }
        .control-group select option { background-color: #111820; color: #d1d8e0; }
        
        .workspace { flex: 1; display: flex; overflow: hidden; position: relative; }
        
        .sidebar { width: 260px; background-color: var(--bg-panel); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 20; flex-shrink: 0; }
        .sidebar-header, .ruler { height: 30px; min-height: 30px; border-bottom: 1px solid var(--border-color); background-color: var(--bg-toolbar); flex-shrink: 0; }
        
        #sidebar-tracks-container { flex: 1; overflow-y: hidden; display: flex; flex-direction: column; }
        #sidebar-tracks { display: flex; flex-direction: column; padding-bottom: 12px; }
        #tracks-content { display: flex; flex-direction: column; }
        
        .sidebar-track { height: 170px; min-height: 170px; border-bottom: 2px solid var(--border-color); padding: 8px 12px; display: flex; flex-direction: column; background-color: var(--track-bg); box-sizing: border-box;}
        .timeline-track-row { height: 170px; min-height: 170px; border-bottom: 2px solid var(--border-color); position: relative; width: 100%; box-sizing: border-box;}
        
        .track-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; gap: 8px; }
        .track-name { font-size: 13px; font-weight: bold; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
        .btn-delete { background: transparent; color: #ff4757; border: none; font-size: 18px; cursor: pointer; padding: 4px; flex-shrink: 0; opacity: 0.7; transition: 0.2s;}
        .btn-delete:hover { opacity: 1; transform: scale(1.2); }
        
        .ms-group { display: flex; gap: 8px; margin-bottom: 4px; margin-top: 4px;}
        .btn-mute, .btn-solo { flex: 1; height: 30px; border-radius: 4px; border: 1px solid #555; background: #1a222e; color: #aaa; font-weight: bold; cursor: pointer; font-size: 12px; letter-spacing: 1px; transition: 0.2s;}
        
        .btn-mute.active { background-color: var(--btn-mute); color: #fff; border-color: var(--btn-mute); }
        .btn-solo.active { background-color: var(--btn-solo); color: #fff; border-color: var(--btn-solo); }

        .slider-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .slider-row input.gain-slider { accent-color: var(--vol-color); width: 100px; }
        .slider-row input.pan-slider { accent-color: var(--pan-color); width: 100px; }
        .val-display { font-family: monospace; width: 40px; text-align: right; color: var(--text-main); }

        .auto-mode-switch { display: flex; background: rgba(0,0,0,0.3); border-radius: 6px; overflow: hidden; margin-top: 8px; border: 1px solid var(--border-color); height: 36px; }
        .auto-btn { flex: 1; display: flex; justify-content: center; align-items: center; font-size: 13px; cursor: pointer; background: transparent; color: #888; border: none; font-weight: bold; transition: 0.2s; touch-action: manipulation; }
        
        .auto-btn.active-vol { background: var(--vol-color); color: #000; }
        .auto-btn.active-pan { background: var(--pan-color); color: #fff; }
        
        .timeline-viewport { flex: 1; overflow-x: auto; overflow-y: auto; position: relative; background-color: var(--bg-main); outline: none; -webkit-overflow-scrolling: touch; }
        .timeline-container { position: relative; display: flex; flex-direction: column; min-height: 100%;}
        .ruler { position: sticky; top: 0; z-index: 15; cursor: pointer; color: var(--text-muted); }
        .ruler-tick { position: absolute; top: 0; height: 100%; border-left: 1px solid var(--border-color); padding-left: 4px; font-size: 11px; display: flex; align-items: flex-end; padding-bottom: 2px; pointer-events: none; }

        .time-marker { position: absolute; top: 0; bottom: 0; width: 2px; z-index: 25; pointer-events: none; transform: translateX(0px); will-change: transform; }
        .time-marker-handle { position: absolute; top: 0; display: flex; justify-content: center; align-items: center; cursor: grab; pointer-events: auto; height: 30px; }
        
        .playhead { background-color: #ffffff; z-index: 26; box-shadow: 0 0 6px rgba(255,255,255,0.8); }
        .playhead-handle { left: -30px; width: 60px; }
        .playhead-handle::before { content: '▶'; font-size: 12px; background: #ffffff; color: #000; padding: 4px 8px; border-radius: 3px; font-weight: bold; }
        
        .export-start { background-color: #2196f3; z-index: 24; box-shadow: 0 0 4px rgba(33,150,243,0.5); }
        .export-end { background-color: #ff5722; z-index: 24; box-shadow: 0 0 4px rgba(255,87,34,0.5); }
        
        .timeline-grid { position: absolute; top: 30px; left: 0; right: 0; bottom: 0; background-image: linear-gradient(to right, rgba(255,255,255,0.08) 1px, transparent 1px), linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px); pointer-events: none; z-index: 0; }

        .audio-clip { position: absolute; top: 15px; height: 140px; background-color: var(--clip-bg); border: 1px solid var(--clip-border); border-radius: 4px; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.5); transition: opacity 0.1s; will-change: transform, width; }
        .audio-clip.is-muted { opacity: 0.3; filter: grayscale(1); }
        .clip-handle { height: 22px; background-color: rgba(65, 160, 255, 0.4); color: #fff; font-size: 11px; display: flex; align-items: center; justify-content: center; cursor: grab; border-bottom: 1px solid var(--clip-border); z-index: 10; }
        
        .clip-waveform { flex: 1; width: 100%; position: relative; overflow: hidden; pointer-events: none; transition: opacity 0.2s; }
        .clip-waveform.dimmed { opacity: 0.3; }
        
        .clip-stretch-handle { position: absolute; top: 22px; bottom: 0; width: 20px; background-color: rgba(65, 160, 255, 0.25); cursor: ew-resize; z-index: 12; transition: 0.2s; }
        .clip-stretch-handle:hover { background-color: rgba(65, 160, 255, 0.5); }
        .clip-stretch-left { left: 0; border-right: 1px solid rgba(65, 160, 255, 0.5); }
        .clip-stretch-right { right: 0; border-left: 1px solid rgba(65, 160, 255, 0.5); }
        
        .pan-automation-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 6; display: block; opacity: 0.2; pointer-events: none; transition: opacity 0.2s; }
        .pan-automation-layer.active { opacity: 1; pointer-events: auto; }
        
        .pan-line { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .pan-point { position: absolute; width: 18px; height: 18px; background: var(--pan-color); border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); cursor: pointer; touch-action: none; }
        .pan-label { position: absolute; background: rgba(0,0,0,0.8); color: var(--pan-color); font-size: 11px; padding: 2px 4px; border-radius: 3px; transform: translate(-50%, -28px); pointer-events: none; font-weight: bold; border: 1px solid var(--pan-color); }
        
        .envelope-labels-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .env-label { position: absolute; background: rgba(0,0,0,0.85); color: var(--vol-color); font-size: 11px; padding: 2px 4px; border-radius: 3px; font-weight: bold; pointer-events: none; border: 1px solid var(--vol-color); }
        
        .app-footer { height: 28px; background-color: var(--bg-toolbar); border-top: 1px solid var(--border-color); color: var(--text-muted); font-size: 12px; display: flex; align-items: center; justify-content: center; letter-spacing: 1px; flex-shrink: 0; z-index: 100; }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="toolbar-group">
        <h1>LITEMIX v0.9.2 β 5</h1>
        <label class="btn btn-primary" title="新增一個或多個 WAV/MP3 音軌">
            <input type="file" id="audio-upload" accept="audio/*, video/*, .wav, .mp3, .m4a" multiple>📁 新增音軌
        </label>
        <label class="btn" style="background:#1b395e; border-color:#2b5080; color:#a1ccff;" title="開啟 .lmix 專案檔">
            <input type="file" id="project-upload" accept=".lmix, .zip, application/zip, application/octet-stream, */*">📂 開啟專案
        </label>
        <button id="project-save-btn" class="btn" style="background:#1b395e; border-color:#2b5080; color:#a1ccff;" title="儲存為 .lmix 專案檔">💾 儲存專案</button>
    </div>

    <div class="toolbar-group">
        <button id="play-btn" class="btn btn-play">▶ 播放</button>
        <button id="pause-btn" class="btn btn-pause">⏸ 暫停</button>
        <button id="stop-btn" class="btn btn-danger">⏹ 停止</button>
        
        <div class="control-group">
            時間: <input type="number" id="playhead-input" step="0.1" value="0.00" min="0"> s
        </div>
        
        <div class="control-group" title="按住 Ctrl + 滾輪可縮放時間軸">🔍 縮放: <span id="zoom-val">100%</span></div>
        
        <div class="control-group" style="display:none">
            <input type="checkbox" id="snap-toggle"> <label for="snap-toggle" style="cursor:pointer;">游標磁吸</label>
            <select id="snap-grid">
                <option value="1">1s</option>
                <option value="0.5" selected>0.5s</option>
                <option value="0.1">0.1s</option>
            </select>
        </div>
    </div>

    <div class="toolbar-group">
        <div class="control-group">
            輸出: <input type="number" id="exp-start-input" step="0.1" value="0" min="0"> ~ <input type="number" id="exp-end-input" step="0.1" value="10" min="0"> s
        </div>
        <div class="control-group" title="開啟以避免破音 (Clipping)">
            <input type="checkbox" id="master-fx"> <label for="master-fx" style="cursor:pointer; color:var(--btn-solo); font-weight:bold;">母帶限幅</label>
        </div>
        <button id="export-btn" class="btn btn-primary">💿 匯出 WAV</button>
    </div>
</div>

<div class="workspace">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"></div>
        <div id="sidebar-tracks-container">
            <div id="sidebar-tracks"></div>
        </div>
    </div>
    
    <div class="timeline-viewport" id="viewport" tabindex="0">
        <div class="timeline-container" id="timeline">
            <div class="ruler" id="ruler"></div>
            <div class="timeline-grid" id="grid-bg"></div>
            
            <div class="time-marker playhead" id="playhead" style="transform: translateX(0px);"><div class="time-marker-handle playhead-handle" id="playhead-handle"></div></div>
            <div class="time-marker export-start" id="exp-start-line" style="transform: translateX(0px);">
                <div class="time-marker-handle" id="exp-start-handle" style="background:rgba(33,150,243,0.3); border-right: 2px solid #2196f3; left:-60px; width:60px;">
                    <span style="color:#fff;font-size:11px;font-weight:bold;">[ Start</span>
                </div>
            </div>
            <div class="time-marker export-end" id="exp-end-line" style="transform: translateX(2000px);">
                <div class="time-marker-handle" id="exp-end-handle" style="background:rgba(255,87,34,0.3); border-left: 2px solid #ff5722; left:0px; width:60px;">
                    <span style="color:#fff;font-size:11px;font-weight:bold;">End ]</span>
                </div>
            </div>
            
            <div id="tracks-content"></div>
        </div>
    </div>
</div>

<div class="app-footer">
    Anshaer Studio &nbsp;|&nbsp; © 2026 Anshaer All Rights Reserved.
</div>

<script type="module">
    import WaveSurfer from 'https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.esm.js';
    import EnvelopePlugin from 'https://unpkg.com/wavesurfer.js@7/dist/plugins/envelope.esm.js';

    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    const coreAudioCtx = new AudioContextClass(); 

    const unlockAudioContext = () => {
        if (coreAudioCtx.state === 'suspended') {
            coreAudioCtx.resume().then(() => console.log('AudioContext 已解鎖'));
        }
    };
    document.addEventListener('touchstart', unlockAudioContext, { once: true });
    document.addEventListener('click', unlockAudioContext, { once: true });

    const sidebarTracks = document.getElementById('sidebar-tracks');
    const tracksContent = document.getElementById('tracks-content');
    const timeline = document.getElementById('timeline');
    const viewport = document.getElementById('viewport');
    const ruler = document.getElementById('ruler');
    const gridBg = document.getElementById('grid-bg');
    const playhead = document.getElementById('playhead');
    const expStartLine = document.getElementById('exp-start-line');
    const expEndLine = document.getElementById('exp-end-line');
    
    let basePPS = 200, zoomLevel = 1.0, getPPS = () => basePPS * zoomLevel;
    let tracks = [], globalTime = 0, exportStartTime = 0, exportEndTime = 10;
    let isPlaying = false, playAnimationId, startRealTime = 0, startGlobalTime = 0, liveAudioNodes = []; 

    function getFileTimestamp() {
        const d = new Date();
        const pad = n => n.toString().padStart(2, '0');
        return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
    }

    viewport.addEventListener('scroll', () => { 
        document.getElementById('sidebar-tracks-container').scrollTop = viewport.scrollTop; 
    });
    
    viewport.addEventListener('wheel', (e) => {
        if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            zoomLevel = Math.max(0.1, Math.min(zoomLevel * (e.deltaY > 0 ? 0.9 : 1.1), 5.0));
            document.getElementById('zoom-val').textContent = `${Math.round(zoomLevel * 100)}%`;
            updateAllVisuals();
        }
    }, { passive: false });

    const snapToggle = document.getElementById('snap-toggle');
    const snapGrid = document.getElementById('snap-grid');
    function applySnap(time) {
        if (!snapToggle || !snapGrid) return time;
        if (!snapToggle.checked) return time;
        const grid = parseFloat(snapGrid.value);
        return Math.round(time / grid) * grid;
    }

    const playheadInput = document.getElementById('playhead-input');
    const expStartInput = document.getElementById('exp-start-input');
    const expEndInput = document.getElementById('exp-end-input');

    playheadInput.addEventListener('change', () => {
        let t = parseFloat(playheadInput.value);
        if (isNaN(t) || t < 0) t = 0;
        globalTime = applySnap(t);
        updateAllVisuals();
        if (isPlaying) { stopAudioNodes(); startPlayback(); }
    });
    
    expStartInput.addEventListener('change', () => {
        exportStartTime = Math.max(0, parseFloat(expStartInput.value) || 0);
        if (exportStartTime > exportEndTime - 0.1) exportStartTime = exportEndTime - 0.1;
        updateAllVisuals();
    });
    
    expEndInput.addEventListener('change', () => {
        exportEndTime = Math.max(exportStartTime + 0.1, parseFloat(expEndInput.value) || 0);
        updateAllVisuals();
    });

    function updateAllVisuals() {
        const pps = getPPS();
        const maxTrackTime = tracks.reduce((max, t) => Math.max(max, t.offset + t.effectiveDuration), 0);
        const totalSeconds = Math.max(20, Math.ceil(Math.max(exportEndTime, maxTrackTime) + 5)); 
        const widthPx = totalSeconds * pps;
        
        timeline.style.width = `${widthPx}px`;
        gridBg.style.backgroundSize = `${pps}px 100%, ${pps/10}px 100%`;

        ruler.innerHTML = '';
        for(let i = 0; i <= totalSeconds; i++) {
            let tick = document.createElement('div'); tick.className = 'ruler-tick';
            tick.style.left = `${i * pps}px`; tick.textContent = `${i}s`;
            ruler.appendChild(tick);
        }

        playhead.style.transform = `translateX(${globalTime * pps}px)`;
        expStartLine.style.transform = `translateX(${exportStartTime * pps}px)`;
        expEndLine.style.transform = `translateX(${exportEndTime * pps}px)`;
        
        if (document.activeElement.id !== 'playhead-input') playheadInput.value = globalTime.toFixed(2);
        if (document.activeElement.id !== 'exp-start-input') expStartInput.value = exportStartTime.toFixed(1);
        if (document.activeElement.id !== 'exp-end-input') expEndInput.value = exportEndTime.toFixed(1);

        tracks.forEach(t => {
            t.clipElement.style.transform = `translateX(${t.offset * pps}px)`;
            const safeWidth = Math.max(20, t.effectiveDuration * pps);
            t.clipElement.style.width = `${safeWidth}px`;
            t.wavesurfer.setOptions({ width: safeWidth });
            t.sidebarRow.querySelector('.track-duration-text').textContent = `${t.effectiveDuration.toFixed(2)}s (x${t.playbackRate.toFixed(2)})`;
            renderVolumeLabels(t);
            drawPanAutomation(t); 
        });
    }

    function setupMarkerDrag(handle, onDrag, onDrop) {
        let isDragging = false;
        
        const startDrag = (e) => { 
            isDragging = true; 
            e.stopPropagation(); 
            if(e.type === 'touchstart') e.preventDefault(); 
        };
        const moveDrag = (e) => {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const rect = timeline.getBoundingClientRect();
            let rawTime = Math.max(0, (clientX - rect.left) / getPPS());
            onDrag(applySnap(rawTime));
            updateAllVisuals();
        };
        const endDrag = () => { if (isDragging) { isDragging = false; if(onDrop) onDrop(); } };

        handle.addEventListener('mousedown', startDrag);
        handle.addEventListener('touchstart', startDrag, {passive: false});
        
        window.addEventListener('mousemove', moveDrag);
        window.addEventListener('touchmove', moveDrag, {passive: false});
        
        window.addEventListener('mouseup', endDrag);
        window.addEventListener('touchend', endDrag);
    }

    setupMarkerDrag(document.getElementById('playhead-handle'), t => globalTime = t, () => { if(isPlaying){ stopAudioNodes(); startPlayback(); } });
    setupMarkerDrag(document.getElementById('exp-start-handle'), t => exportStartTime = Math.min(t, exportEndTime - 0.1));
    setupMarkerDrag(document.getElementById('exp-end-handle'), t => exportEndTime = Math.max(t, exportStartTime + 0.1));

    ruler.addEventListener('click', (e) => {
        const rect = timeline.getBoundingClientRect();
        globalTime = applySnap(Math.max(0, (e.clientX - rect.left) / getPPS()));
        updateAllVisuals();
        if (isPlaying) { stopAudioNodes(); startPlayback(); }
    });

    document.getElementById('audio-upload').addEventListener('change', async (e) => {
        unlockAudioContext(); 
        for (const file of Array.from(e.target.files)) {
            await createTrack(file, file.name);
        }
        e.target.value = ''; 
    });

    async function createTrack(fileOrBlob, fileName, restoreData = null) {
        const trackId = 'track_' + Date.now() + Math.random().toString(36).substr(2, 9);
        let buffer;
        let objUrl;
        
        try {
            if (coreAudioCtx.state === 'suspended') await coreAudioCtx.resume();
            const arrayBuffer = await fileOrBlob.arrayBuffer();
            buffer = await coreAudioCtx.decodeAudioData(arrayBuffer);
            objUrl = URL.createObjectURL(fileOrBlob);
        } catch (err) {
            alert(`載入音訊失敗 (${fileName})\n錯誤訊息: ${err.message || '請確認檔案格式是否正確'}`);
            console.error('Decode Error:', err);
            return; 
        }
        
        const origDur = buffer.duration;
        const effDur = restoreData ? restoreData.effectiveDuration : origDur;
        const offset = restoreData ? restoreData.offset : 0;
        const pRate = restoreData ? restoreData.playbackRate : 1.0;

        const sbRow = document.createElement('div'); sbRow.className = 'sidebar-track';
        sbRow.innerHTML = `
            <div class="track-header">
                <div class="track-name" title="${fileName}">${fileName}</div>
                <button class="btn-delete" title="刪除軌道">✖</button>
            </div>
            <div class="track-duration-text" style="font-size: 10px; color: var(--text-muted);">${effDur.toFixed(2)}s (x${pRate.toFixed(2)})</div>
            <div class="ms-group">
                <button class="btn-mute ${restoreData && restoreData.mute ? 'active':''}">M 靜音</button>
                <button class="btn-solo ${restoreData && restoreData.solo ? 'active':''}">S 獨奏</button>
            </div>
            <div class="slider-row">Vol <input type="range" class="vol-slider gain-slider" min="-24" max="12" step="0.1" value="${restoreData ? restoreData.gainDB : 0}"><span class="val-display gain-value">${restoreData ? restoreData.gainDB.toFixed(1) : '0.0'}</span></div>
            <div class="slider-row">Pan <input type="range" class="pan-slider" min="-1" max="1" step="0.01" value="${restoreData ? restoreData.pan : 0}"><span class="val-display pan-value">C</span></div>
            <div class="auto-mode-switch"><button class="auto-btn active-vol">音量曲線</button><button class="auto-btn">聲像曲線</button></div>
        `;
        sidebarTracks.appendChild(sbRow);

        const tRow = document.createElement('div'); tRow.className = 'timeline-track-row';
        const clip = document.createElement('div'); clip.className = 'audio-clip';
        if(restoreData && restoreData.mute) clip.classList.add('is-muted');
        
        const dragHandle = document.createElement('div'); dragHandle.className = 'clip-handle'; dragHandle.textContent = '⋮⋮ 拖拉移動 ⋮⋮';
        const stLeft = document.createElement('div'); stLeft.className = 'clip-stretch-handle clip-stretch-left';
        const stRight = document.createElement('div'); stRight.className = 'clip-stretch-handle clip-stretch-right';
        
        const wsCont = document.createElement('div'); wsCont.className = 'clip-waveform';
        const volLabels = document.createElement('div'); volLabels.className = 'envelope-labels-layer';
        const panLayer = document.createElement('div'); panLayer.className = 'pan-automation-layer';
        
        wsCont.appendChild(volLabels); 
        clip.append(dragHandle, stLeft, stRight, wsCont, panLayer);
        tRow.appendChild(clip); tracksContent.appendChild(tRow);

        const ws = WaveSurfer.create({ container: wsCont, waveColor: '#41a0ff', cursorColor: 'transparent', height: 'auto', normalize: true, interact: false });
        ws.setVolume(0); 

        const envOpts = { 
            volume: 0.846, 
            lineColor: '#48c790', 
            dragPointFill: '#48c790', 
            dragPointStroke: '#ffffff',
            lineWidth: 3, 
            dragPointSize: 24, 
            dragLine: true, 
            dragPoint: true 
        };
        if (restoreData && restoreData.volPoints) envOpts.points = restoreData.volPoints;

        const tData = {
            id: trackId, fileName: fileName, sidebarRow: sbRow, trackRow: tRow, clipElement: clip, wavesurfer: ws, buffer: buffer,
            originalDuration: origDur, effectiveDuration: effDur, playbackRate: pRate, offset: offset,
            gainDB: restoreData ? restoreData.gainDB : 0, 
            pan: restoreData ? restoreData.pan : 0, 
            mute: restoreData ? restoreData.mute : false, 
            solo: restoreData ? restoreData.solo : false, 
            envelopePoints: restoreData && Array.isArray(restoreData.volPoints) ? restoreData.volPoints : [], 
            panPoints: restoreData && Array.isArray(restoreData.panPoints) ? restoreData.panPoints : [], 
            panLayer: panLayer, wsCont: wsCont, volLabels: volLabels,
            envelope: ws.registerPlugin(EnvelopePlugin.create(envOpts)),
            objectUrl: objUrl 
        };

        const gSlider = sbRow.querySelector('.gain-slider'); const gVal = sbRow.querySelector('.gain-value');
        gSlider.addEventListener('input', e => { tData.gainDB = parseFloat(e.target.value); gVal.textContent = tData.gainDB.toFixed(1); });

        const pSlider = sbRow.querySelector('.pan-slider'); const pVal = sbRow.querySelector('.pan-value');
        if(restoreData && restoreData.pan !== 0) pVal.textContent = restoreData.pan < 0 ? `L${Math.abs(Math.round(restoreData.pan*100))}` : `R${Math.round(restoreData.pan*100)}`;
        pSlider.addEventListener('input', e => { 
            tData.pan = parseFloat(e.target.value); 
            pVal.textContent = tData.pan === 0 ? 'C' : (tData.pan < 0 ? `L${Math.abs(Math.round(tData.pan*100))}` : `R${Math.round(tData.pan*100)}`); 
        });

        const btnMute = sbRow.querySelector('.btn-mute');
        btnMute.addEventListener('click', () => { tData.mute = !tData.mute; btnMute.classList.toggle('active', tData.mute); clip.classList.toggle('is-muted', tData.mute); });
        const btnSolo = sbRow.querySelector('.btn-solo');
        btnSolo.addEventListener('click', () => { tData.solo = !tData.solo; btnSolo.classList.toggle('active', tData.solo); });

        sbRow.querySelector('.btn-delete').addEventListener('click', () => {
            ws.destroy(); sbRow.remove(); tRow.remove();
            URL.revokeObjectURL(tData.objectUrl); 
            tracks = tracks.filter(t => t.id !== trackId);
            updateAllVisuals();
        });

        tData.envelope.on('points-change', (points) => {
            tData.envelopePoints = points || [];
            renderVolumeLabels(tData);
        });

        // ==========================================
        // iPad 修正：音量曲線專屬雙擊/雙點刪除邏輯
        // ==========================================
        let lastVolTap = 0;
        const attemptDeleteVolPoint = (e) => {
            // 如果不在音量編輯模式，則不處理
            if (wsCont.style.pointerEvents === 'none') return false; 


            let clientX = 0, clientY = 0;
            // 兼容 mouse 與 touch 事件 (包含 touchend)
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else if (e.changedTouches && e.changedTouches.length > 0) {
                clientX = e.changedTouches[0].clientX;
                clientY = e.changedTouches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }


            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const rect = wsCont.getBoundingClientRect();
            
            const clickTime = Math.max(0, (clientX - rect.left) / rect.width * tData.originalDuration);
            const clickVol = Math.max(0, Math.min(1, 1 - (clientY - rect.top) / rect.height));
            
            const points = tData.envelope.getPoints() || [];
            
            // 點擊判定寬容度：大約 30 px 範圍
            const timeThreshold = (40 / rect.width) * tData.originalDuration; 
            const volThreshold = 40 / rect.height; 
            
            let pointToRemove = -1;
            let minDiff = 9999;
            
            for (let i = 0; i < points.length; i++) {
                const timeDiff = Math.abs(points[i].time - clickTime);
                const volDiff = Math.abs(points[i].volume - clickVol);
                
                if (timeDiff < timeThreshold && volDiff < volThreshold) {
                    if (timeDiff < minDiff) { // 尋找距離最近的點
                        minDiff = timeDiff;
                        pointToRemove = i;
                    }
                }
            }
            
            if (pointToRemove !== -1) {
                points.splice(pointToRemove, 1);
                tData.envelope.setPoints(points); // 重新覆寫回去，觸發重繪
                tData.envelopePoints = points;
                renderVolumeLabels(tData);
                return true; // 成功刪除
            }
            return false;
        };

        wsCont.addEventListener('contextmenu', (e) => {
            e.preventDefault();   // 永遠阻擋瀏覽器預設右鍵選單
            e.stopPropagation();
            attemptDeleteVolPoint(e); // 執行刪除
        }, { capture: true });


        
        // 攔截雙擊事件 (電腦與部分行動裝置觸發)
        wsCont.addEventListener('dblclick', (e) => {
            if (attemptDeleteVolPoint(e)) {
                e.stopPropagation(); // 阻止 WaveSurfer 預設的新增點事件
                e.preventDefault();
            }
        }, { capture: true }); // 使用 capture 確保我們比插件更早攔截到事件

        // 攔截雙點事件 (專為 iPad/Mobile 設計)
        wsCont.addEventListener('touchstart', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastVolTap;
            if (tapLength < 300 && tapLength > 0) {
                if (attemptDeleteVolPoint(e)) {
                    e.stopPropagation();
                    e.preventDefault();
                }
                lastVolTap = 0;
            } else {
                lastVolTap = currentTime;
            }
        }, { capture: true, passive: false });

        const btnVol = sbRow.querySelector('.auto-btn:nth-child(1)');
        const btnPan = sbRow.querySelector('.auto-btn:nth-child(2)');
        
        btnVol.addEventListener('click', () => { 
            btnVol.classList.add('active-vol'); 
            btnPan.classList.remove('active-pan'); 
            panLayer.classList.remove('active'); 
            wsCont.classList.remove('dimmed');
            wsCont.style.pointerEvents = 'auto'; 
        });
        btnPan.addEventListener('click', () => { 
            btnPan.classList.add('active-pan'); 
            btnVol.classList.remove('active-vol'); 
            panLayer.classList.add('active'); 
            wsCont.classList.add('dimmed');
            wsCont.style.pointerEvents = 'none'; 
        });

        panLayer.innerHTML = `<svg class="pan-line" preserveAspectRatio="none" viewBox="0 0 100 100" width="100%" height="100%"><polyline fill="none" stroke="var(--pan-color)" stroke-width="1.5" vector-effect="non-scaling-stroke"/></svg>`;
        
        let lastLayerTap = 0;
        const addPanPoint = (e) => {
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const rect = panLayer.getBoundingClientRect();
            const time = (clientX - rect.left) / rect.width * tData.originalDuration; 
            const rawVol = 1 - (clientY - rect.top) / rect.height; 
            const panVal = (rawVol * 2) - 1; 
            tData.panPoints.push({ time, value: panVal });
            drawPanAutomation(tData);
        };
        
        panLayer.addEventListener('dblclick', addPanPoint);
        panLayer.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastLayerTap;
            if (tapLength < 300 && tapLength > 0) {
                addPanPoint(e);
                lastLayerTap = 0;
                return;
            }
            lastLayerTap = currentTime;
        }, {passive: false});

        ws.load(objUrl);
        tracks.push(tData);
        updateAllVisuals();

        let isDrag = false, activeAction = null, sx = 0, sL = 0, sW = 0;
        
        const startAction = (e, action) => { 
            isDrag = true; activeAction = action; 
            sx = e.touches ? e.touches[0].clientX : e.clientX; 
            sL = parseFloat(tData.offset * getPPS()) || 0; 
            sW = parseFloat(tData.effectiveDuration * getPPS()) || 0; 
            e.stopPropagation(); 
            if(e.type === 'touchstart') e.preventDefault();
        };
        
        dragHandle.addEventListener('mousedown', e => startAction(e, 'move'));
        dragHandle.addEventListener('touchstart', e => startAction(e, 'move'), {passive: false});
        
        stRight.addEventListener('mousedown', e => startAction(e, 'stretch-r'));
        stRight.addEventListener('touchstart', e => startAction(e, 'stretch-r'), {passive: false});
        
        stLeft.addEventListener('mousedown', e => startAction(e, 'stretch-l'));
        stLeft.addEventListener('touchstart', e => startAction(e, 'stretch-l'), {passive: false});

        const moveAction = (e) => {
            if(!isDrag) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const deltaX = clientX - sx;
            const pps = getPPS();

            if (activeAction === 'move') {
                let newLeft = Math.max(0, sL + deltaX);
                tData.offset = newLeft / pps;
            } 
            else if (activeAction === 'stretch-r') {
                let newWidth = Math.max(20, sW + deltaX);
                tData.effectiveDuration = newWidth / pps;
            } 
            else if (activeAction === 'stretch-l') {
                let maxDelta = sW - 20; 
                let allowedDelta = deltaX > maxDelta ? maxDelta : deltaX;
                
                let newLeft = sL + allowedDelta;
                if (newLeft < 0) {
                    newLeft = 0;
                    allowedDelta = -sL;
                }
                let newWidth = sW - allowedDelta;
                
                tData.offset = newLeft / pps;
                tData.effectiveDuration = newWidth / pps;
            }
            
            tData.playbackRate = tData.originalDuration / tData.effectiveDuration;
            updateAllVisuals();
        };

        window.addEventListener('mousemove', moveAction);
        window.addEventListener('touchmove', moveAction, {passive: false});

        const endAction = () => { if(isDrag) isDrag = false; };
        window.addEventListener('mouseup', endAction);
        window.addEventListener('touchend', endAction);
    }

    function renderVolumeLabels(t) {
        t.volLabels.innerHTML = '';
        if (!Array.isArray(t.envelopePoints)) return;
        
        t.envelopePoints.forEach(p => {
            const lbl = document.createElement('div'); lbl.className = 'env-label';
            lbl.style.left = `${(p.time / t.originalDuration) * 100}%`;
            lbl.style.top = `${(1 - p.volume) * 100}%`;
            lbl.style.transform = p.volume > 0.85 ? 'translate(-50%, 14px)' : 'translate(-50%, -140%)';
            lbl.innerText = `${Math.round(((p.volume * 1.3) - 0.1) * 100)}%`;
            t.volLabels.appendChild(lbl);
        });
    }

    function drawPanAutomation(t) {
        const svg = t.panLayer.querySelector('polyline');
        t.panLayer.querySelectorAll('.pan-point, .pan-label').forEach(e => e.remove());
        
        if (!Array.isArray(t.panPoints)) t.panPoints = [];
        t.panPoints.sort((a,b) => a.time - b.time);
        let pointsStr = "";
        
        t.panPoints.forEach((p, idx) => {
            const xPercent = (p.time / t.originalDuration) * 100;
            const yPercent = (1 - ((p.value + 1) / 2)) * 100; 
            pointsStr += `${xPercent},${yPercent} `;

            const dot = document.createElement('div'); dot.className = 'pan-point';
            dot.style.left = `${xPercent}%`; dot.style.top = `${yPercent}%`;
            
            const lbl = document.createElement('div'); lbl.className = 'pan-label';
            lbl.style.left = `${xPercent}%`; lbl.style.top = `${yPercent}%`;
            lbl.textContent = p.value === 0 ? 'C' : (p.value < 0 ? `L${Math.abs(Math.round(p.value*100))}` : `R${Math.round(p.value*100)}`);
            
            let isDraggingPoint = false;
            let lastTap = 0; 
            
            const startPtDrag = (e) => { 
                e.stopPropagation(); 
                if(e.type === 'touchstart') {
                    e.preventDefault();
                    const currentTime = new Date().getTime();
                    const tapLength = currentTime - lastTap;
                    
                    if (tapLength < 300 && tapLength > 0) {
                        t.panPoints.splice(idx, 1); 
                        drawPanAutomation(t); 
                        lastTap = 0; 
                        return;
                    }
                    lastTap = currentTime;
                }
                isDraggingPoint = true; 
            };

            dot.addEventListener('mousedown', startPtDrag);
            dot.addEventListener('touchstart', startPtDrag, {passive: false});
            
            dot.addEventListener('dblclick', (e) => {
                e.preventDefault();
                t.panPoints.splice(idx, 1); 
                drawPanAutomation(t);
            });

            const movePtDrag = (e) => {
                if(!isDraggingPoint) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const rect = t.panLayer.getBoundingClientRect();
                p.time = Math.max(0, Math.min(t.originalDuration, (clientX - rect.left) / rect.width * t.originalDuration));
                p.value = Math.max(-1, Math.min(1, ((1 - (clientY - rect.top) / rect.height) * 2) - 1));
                drawPanAutomation(t);
            };

            window.addEventListener('mousemove', movePtDrag);
            window.addEventListener('touchmove', movePtDrag, {passive: false});

            const endPtDrag = () => { if(isDraggingPoint) isDraggingPoint = false; };
            window.addEventListener('mouseup', endPtDrag);
            window.addEventListener('touchend', endPtDrag);
            
            dot.addEventListener('contextmenu', (e) => { e.preventDefault(); t.panPoints.splice(idx, 1); drawPanAutomation(t); });

            t.panLayer.appendChild(dot); t.panLayer.appendChild(lbl);
        });
        
        if(t.panPoints.length > 0) {
            let startY = (1 - ((t.panPoints[0].value + 1) / 2)) * 100;
            let endY = (1 - ((t.panPoints[t.panPoints.length-1].value + 1) / 2)) * 100;
            svg.setAttribute('points', `0,${startY} ${pointsStr} 100,${endY}`);
        } else {
            svg.setAttribute('points', '');
        }
    }

    function buildAudioGraph(ctx, startTimeSec, renderMode = 'live') {
        const nodesList = [];
        const anySolo = tracks.some(t => t.solo);
        
        const masterGain = ctx.createGain();
        masterGain.connect(ctx.destination);
        
        if (document.getElementById('master-fx').checked) {
            const comp = ctx.createDynamicsCompressor();
            comp.threshold.value = -12; comp.knee.value = 10;
            comp.ratio.value = 4; comp.attack.value = 0.005; comp.release.value = 0.1;
            masterGain.disconnect(); masterGain.connect(comp); comp.connect(ctx.destination);
        }

        const now = renderMode === 'live' ? ctx.currentTime : 0;
        const baseTime = renderMode === 'export' ? exportStartTime : startTimeSec;

        tracks.forEach(t => {
            if (t.mute || (anySolo && !t.solo)) return;
            if (t.offset + t.effectiveDuration <= baseTime) return; 
            if (renderMode === 'export' && t.offset >= exportEndTime) return;

            const source = ctx.createBufferSource();
            source.buffer = t.buffer;
            source.playbackRate.value = t.playbackRate;

            const trackGain = ctx.createGain();
            const trackPan = ctx.createStereoPanner();
            
            const staticGainVal = Math.pow(10, t.gainDB / 20);
            trackPan.pan.value = t.pan;

            source.connect(trackGain).connect(trackPan).connect(masterGain);

            const renderStart = t.offset - baseTime;
            const playStartTime = now + Math.max(0, renderStart);
            const bufferOffset = Math.max(0, -renderStart) * t.playbackRate;
            const absoluteTrackStart = now + renderStart; 

            if (t.envelopePoints && t.envelopePoints.length > 0) {
                const sortedPts = [...t.envelopePoints].sort((a, b) => a.time - b.time);
                let initVol = (sortedPts[0].time > 0) ? 0.846 : sortedPts[0].volume;
                let initGain = Math.max(0, (initVol * 1.3) - 0.1) * staticGainVal;
                trackGain.gain.setValueAtTime(initGain, Math.max(now, absoluteTrackStart));

                sortedPts.forEach(p => {
                    let pointAbsoluteTime = absoluteTrackStart + (p.time / t.playbackRate);
                    let val = Math.max(0, (p.volume * 1.3) - 0.1) * staticGainVal;
                    if (pointAbsoluteTime > now) trackGain.gain.linearRampToValueAtTime(val, pointAbsoluteTime);
                    else trackGain.gain.setValueAtTime(val, now);
                });

                let lastGain = Math.max(0, (sortedPts[sortedPts.length-1].volume * 1.3) - 0.1) * staticGainVal;
                trackGain.gain.setValueAtTime(lastGain, absoluteTrackStart + t.effectiveDuration);
            } else {
                trackGain.gain.setValueAtTime(staticGainVal, Math.max(now, absoluteTrackStart));
            }

            if (t.panPoints && t.panPoints.length > 0) {
                const sortedPan = [...t.panPoints].sort((a,b) => a.time - b.time);
                trackPan.pan.setValueAtTime(sortedPan[0].value, Math.max(now, absoluteTrackStart));
                sortedPan.forEach(p => {
                    let pointAbsoluteTime = absoluteTrackStart + (p.time / t.playbackRate);
                    if (pointAbsoluteTime > now) trackPan.pan.linearRampToValueAtTime(p.value, pointAbsoluteTime);
                    else trackPan.pan.setValueAtTime(p.value, now);
                });
                trackPan.pan.setValueAtTime(sortedPan[sortedPan.length-1].value, absoluteTrackStart + t.effectiveDuration);
            }

            source.start(playStartTime, bufferOffset);
            nodesList.push({ source, trackGain, trackPan }); 
        });
        return nodesList;
    }

    function startPlayback() {
        if (isPlaying) return;
        isPlaying = true;
        if (coreAudioCtx.state === 'suspended') coreAudioCtx.resume();
        
        startRealTime = coreAudioCtx.currentTime;
        startGlobalTime = globalTime;

        liveAudioNodes = buildAudioGraph(coreAudioCtx, globalTime, 'live');

        function animate() {
            globalTime = startGlobalTime + (coreAudioCtx.currentTime - startRealTime);
            updateAllVisuals();
            const viewRight = viewport.scrollLeft + viewport.clientWidth;
            if (globalTime * getPPS() > viewRight - 50) viewport.scrollLeft += 100;
            if (isPlaying) playAnimationId = requestAnimationFrame(animate);
        }
        animate();
    }

    function stopAudioNodes() {
        liveAudioNodes.forEach(node => { 
            try{ 
                node.source.stop();
                node.source.disconnect();
                node.trackGain.disconnect();
                node.trackPan.disconnect();
            }catch(e){} 
        });
        liveAudioNodes = [];
    }

    document.getElementById('play-btn').addEventListener('click', startPlayback);
    document.getElementById('pause-btn').addEventListener('click', () => {
        if (!isPlaying) return;
        isPlaying = false; cancelAnimationFrame(playAnimationId);
        stopAudioNodes(); updateAllVisuals();
    });
    document.getElementById('stop-btn').addEventListener('click', () => {
        isPlaying = false; cancelAnimationFrame(playAnimationId);
        stopAudioNodes(); globalTime = 0; updateAllVisuals();
    });

    document.getElementById('export-btn').addEventListener('click', async () => {
        if (tracks.length === 0) return alert('請加入音軌');
        const dur = exportEndTime - exportStartTime; if (dur <= 0) return alert('無效範圍');
        
        const btn = document.getElementById('export-btn');
        btn.textContent = '⏳ 母帶運算中...'; btn.disabled = true;

        try {
            const sampleRate = 44100;
            const offlineCtx = new OfflineAudioContext(2, Math.ceil(dur * sampleRate), sampleRate);
            buildAudioGraph(offlineCtx, exportStartTime, 'export');
            const renderedBuffer = await offlineCtx.startRendering();
            const wavBlob = audioBufferToWav(renderedBuffer);
            const a = document.createElement('a'); a.href = URL.createObjectURL(wavBlob);
            
            a.download = `LiteMix_${getFileTimestamp()}_${exportStartTime.toFixed(1)}_to_${exportEndTime.toFixed(1)}.wav`; 
            a.click();
            
        } catch (e) { alert(`編譯失敗\n錯誤: ${e.message}`); console.error(e); } finally { btn.textContent = '💿 匯出 WAV'; btn.disabled = false; }
    });

    function audioBufferToWav(buffer) {
        const numChan = buffer.numberOfChannels; const len = buffer.length * numChan * 2 + 44;
        const ab = new ArrayBuffer(len); const view = new DataView(ab);
        const channels = []; let offset = 0, pos = 0;
        const set16 = (d) => { view.setUint16(pos, d, true); pos+=2; };
        const set32 = (d) => { view.setUint32(pos, d, true); pos+=4; };
        set32(0x46464952); set32(len-8); set32(0x45564157); set32(0x20746d66); set32(16); set16(1); set16(numChan);
        set32(buffer.sampleRate); set32(buffer.sampleRate*2*numChan); set16(numChan*2); set16(16); set32(0x61746164); set32(len-pos-4);
        for(let i=0; i<numChan; i++) channels.push(buffer.getChannelData(i));
        while(pos < len) {
            for(let i=0; i<numChan; i++) {
                let smp = Math.max(-1, Math.min(1, channels[i][offset]));
                smp = (0.5 + smp < 0 ? smp*32768 : smp*32767)|0;
                view.setInt16(pos, smp, true); pos+=2;
            } offset++;
        } return new Blob([ab], {type:"audio/wav"});
    }
</script>
