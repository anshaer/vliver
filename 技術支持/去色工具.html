<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>去色工具 V3</title>
    <style>
        :root {
            --primary: #795548; 
            --secondary: #f1f8e9;
            --accent: #a5d6a7;
        }
        body { font-family: sans-serif; background-color: var(--secondary); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 1200px; width: 100%; text-align: center; }
        .controls { margin: 15px 0; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; background: #f5f5f5; padding: 15px; border-radius: 8px; }
        .control-group { display: flex; align-items: center; gap: 8px; border-right: 1px solid #ddd; padding-right: 10px; }
        .canvas-container { position: relative; display: inline-block; margin-top: 15px; border: 2px solid #ccc; background-image: linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%), linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%); background-size: 20px 20px; background-position: 0 0, 10px 10px; overflow: auto; max-height: 70vh; }
        canvas { max-width: 100%; cursor: crosshair; display: block; }
        button { background-color: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button.active { background-color: #2e7d32; box-shadow: inset 0 0 8px rgba(0,0,0,0.4); }
        .undo-btn { background-color: #607d8b; }
        .status-bar { font-size: 0.85rem; margin-top: 5px; color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>去色工具</h2>
    
    <div class="controls">
        <input type="file" id="upload" accept="image/*">
        
        <div class="control-group">
            <button id="modeMagic" class="mode-btn">✨ 魔術棒</button>
            <button id="modeLasso" class="mode-btn">🪄 套索(直接刪除)</button>
        </div>

        <div class="control-group">
            <button id="undoBtn" class="undo-btn">↩️ 上一步</button>
            <button id="resetBtn" style="background:#e57373;">重置</button>
        </div>

        <div class="control-group">
            <label>容差：</label>
            <input type="number" id="tolerance" min="0" max="255" value="30">
            <input type="color" id="colorPicker" value="#ffffff">
        </div>

        <button id="downloadBtn">下載 PNG</button>
    </div>

    <div class="status-bar" id="statusBar">模式：一般點擊 (全圖去色)</div>

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const upload = document.getElementById('upload');
    const colorPicker = document.getElementById('colorPicker');
    const toleranceInput = document.getElementById('tolerance');
    const statusBar = document.getElementById('statusBar');
    
    let originalImage = null;
    let currentMode = 'normal'; 
    let isDrawing = false;
    let lassoPath = [];
    let historyStack = [];

    upload.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            originalImage = new Image();
            originalImage.onload = () => {
                canvas.width = originalImage.width;
                canvas.height = originalImage.height;
                historyStack = [];
                ctx.drawImage(originalImage, 0, 0);
                saveHistory();
            };
            originalImage.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    function saveHistory() {
        if (historyStack.length >= 30) historyStack.shift();
        historyStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
    }

    document.getElementById('undoBtn').onclick = () => {
        if (historyStack.length > 1) {
            historyStack.pop();
            ctx.putImageData(historyStack[historyStack.length - 1], 0, 0);
        }
    };

    document.getElementById('modeMagic').onclick = () => setMode('magic');
    document.getElementById('modeLasso').onclick = () => setMode('lasso');
    document.getElementById('resetBtn').onclick = () => {
        if (!originalImage) return;
        ctx.drawImage(originalImage, 0, 0);
        saveHistory();
    };

    function setMode(newMode) {
        currentMode = (currentMode === newMode) ? 'normal' : newMode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        if (currentMode !== 'normal') {
            document.getElementById('mode' + currentMode.charAt(0).toUpperCase() + currentMode.slice(1)).classList.add('active');
            statusBar.innerText = currentMode === 'magic' ? "模式：魔術棒 (點擊去色)" : "模式：套索 (圈起來的地方直接變透明)";
        } else {
            statusBar.innerText = "模式：一般點擊 (全圖去色)";
        }
    }

    canvas.onmousedown = (e) => {
        if (!originalImage) return;
        const pt = getMousePos(e);

        if (currentMode === 'magic') {
            applyMagicWand(pt.x, pt.y);
            saveHistory();
        } else if (currentMode === 'lasso') {
            isDrawing = true;
            lassoPath = [pt];
        } else {
            const pixel = ctx.getImageData(pt.x, pt.y, 1, 1).data;
            colorPicker.value = rgbToHex(pixel[0], pixel[1], pixel[2]);
            applyGlobalFilter();
            saveHistory();
        }
    };

    canvas.onmousemove = (e) => {
        if (isDrawing && currentMode === 'lasso') {
            lassoPath.push(getMousePos(e));
            // 即時繪製虛線
            ctx.putImageData(historyStack[historyStack.length - 1], 0, 0);
            ctx.beginPath();
            ctx.strokeStyle = '#ff0000';
            ctx.setLineDash([5, 5]);
            ctx.moveTo(lassoPath[0].x, lassoPath[0].y);
            lassoPath.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();
            ctx.setLineDash([]);
        }
    };

    canvas.onmouseup = () => {
        if (isDrawing) {
            isDrawing = false;
            applyLassoDelete(); // 執行強制刪除
            saveHistory();
        }
    };

    // --- 優化後的演算法 ---

    // 套索：圈起來直接透明
    function applyLassoDelete() {
        if (lassoPath.length < 3) return;
        ctx.putImageData(historyStack[historyStack.length - 1], 0, 0);
        
        ctx.save();
        ctx.globalCompositeOperation = 'destination-out'; // 關鍵：使繪製區域變透明
        ctx.beginPath();
        ctx.moveTo(lassoPath[0].x, lassoPath[0].y);
        lassoPath.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.fill();
        ctx.restore();
        
        lassoPath = [];
    }

    function applyMagicWand(startX, startY) {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        const width = canvas.width, height = canvas.height;
        const idx = (Math.floor(startY) * width + Math.floor(startX)) * 4;
        const targetR = data[idx], targetG = data[idx+1], targetB = data[idx+2], targetA = data[idx+3];
        
        if (targetA === 0) return;

        const tolerance = parseInt(toleranceInput.value);
        const visited = new Uint8Array(width * height);
        const stack = [[Math.floor(startX), Math.floor(startY)]];

        while (stack.length > 0) {
            const [x, y] = stack.pop();
            const curr = y * width + x;
            if (x < 0 || x >= width || y < 0 || y >= height || visited[curr]) continue;
            visited[curr] = 1;
            const p = curr * 4;
            if (data[p+3] === 0) continue;

            const d = Math.sqrt(Math.pow(data[p]-targetR,2) + Math.pow(data[p+1]-targetG,2) + Math.pow(data[p+2]-targetB,2));
            if (d <= tolerance) {
                data[p+3] = 0;
                stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
            }
        }
        ctx.putImageData(imageData, 0, 0);
    }

    function applyGlobalFilter() {
        const target = hexToRgb(colorPicker.value);
        const tolerance = parseInt(toleranceInput.value);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
            if (data[i+3] === 0) continue;
            const d = Math.sqrt(Math.pow(data[i]-target.r,2)+Math.pow(data[i+1]-target.g,2)+Math.pow(data[i+2]-target.b,2));
            if (d <= tolerance) data[i+3] = 0;
        }
        ctx.putImageData(imageData, 0, 0);
    }

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: (e.clientX - rect.left) * (canvas.width / rect.width), y: (e.clientY - rect.top) * (canvas.height / rect.height) };
    }
    function hexToRgb(hex) {
        const b = parseInt(hex.slice(1, 7), 16);
        return { r: (b >> 16) & 255, g: (b >> 8) & 255, b: b & 255 };
    }
    function rgbToHex(r, g, b) {
        return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
    }
    document.getElementById('downloadBtn').onclick = () => {
        const link = document.createElement('a');
        link.download = 'clean_image.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    };
</script>

</body>
</html>
