<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNG 圖片高光產生器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            padding: 20px;
            color: #333;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid #ddd;
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), 
                              linear-gradient(-45deg, #ccc 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #ccc 75%), 
                              linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            margin-top: 20px;
        }
        .btn-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        button, label.upload-btn {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            text-align: center;
        }
        button:hover { background: #0056b3; }
        input[type="range"] { width: 100%; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>✨ 圖片高光產生器</h2>
    
    <div class="controls">
        <div class="control-group">
            <label>上傳圖片 (PNG)</label>
            <label class="upload-btn" for="fileInput">選擇檔案</label>
            <input type="file" id="fileInput" accept="image/png">
        </div>
        <div class="control-group">
            <label>高光強度 (曝光度)</label>
            <input type="range" id="intensity" min="0" max="200" value="100">
        </div>
        <div class="control-group">
            <label>水平位置 (X)</label>
            <input type="range" id="posX" min="0" max="100" value="30">
        </div>
        <div class="control-group">
            <label>垂直位置 (Y)</label>
            <input type="range" id="posY" min="0" max="100" value="30">
        </div>
        <div class="control-group">
            <label>擴散範圍 (Size)</label>
            <input type="range" id="size" min="10" max="150" value="50">
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <div class="btn-group">
        <button id="downloadBtn">下載圖片</button>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const intensityInput = document.getElementById('intensity');
    const posXInput = document.getElementById('posX');
    const posYInput = document.getElementById('posY');
    const sizeInput = document.getElementById('size');
    const downloadBtn = document.getElementById('downloadBtn');

    let img = new Image();

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    draw();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    function draw() {
        if (!img.src) return;

        // 1. 清除畫布
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 2. 繪製原始圖片
        ctx.drawImage(img, 0, 0);

        // 3. 設定混合模式來製作高光
        // 'screen' (濾色) 或 'overlay' (疊加) 適合做高光
        ctx.globalCompositeOperation = 'screen';

        const x = (posXInput.value / 100) * canvas.width;
        const y = (posYInput.value / 100) * canvas.height;
        const radius = (sizeInput.value / 100) * (Math.max(canvas.width, canvas.height) / 2);
        const opacity = intensityInput.value / 200;

        // 4. 建立徑向漸層
        const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
        gradient.addColorStop(0, `rgba(255, 255, 255, ${opacity})`);
        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

        // 5. 限制高光只出現在有像素的地方 (Source-in)
        ctx.fillStyle = gradient;
        
        // 技巧：使用 destination-in 保持原始圖片形狀
        // 但因為我們要的是在原圖上「加」光，我們改用繪圖快照
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 6. 恢復預設混合模式，並確保高光不超出 PNG 透明範圍
        ctx.globalCompositeOperation = 'destination-in';
        ctx.drawImage(img, 0, 0);
        
        // 重新畫一遍底圖，因為剛才的 operation 會把底圖弄透明
        ctx.globalCompositeOperation = 'destination-over';
        ctx.drawImage(img, 0, 0);

        // 重置模式
        ctx.globalCompositeOperation = 'source-over';
    }

    // 監聽拉桿變動
    [intensityInput, posXInput, posYInput, sizeInput].forEach(input => {
        input.addEventListener('input', draw);
    });

    // 下載功能
    downloadBtn.addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'highlighted-image.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
</script>

</body>
</html>
