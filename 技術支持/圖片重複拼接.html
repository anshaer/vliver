<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖片拼接工具</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .controls { margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
        canvas { border: 1px solid #ddd; max-width: 100%; height: auto; margin-top: 10px; }
        label { margin-right: 10px; }
        button { cursor: pointer; padding: 5px 15px; }
    </style>
</head>
<body>

<h2>圖片重複拼接工具</h2>

<div class="controls">
    <input type="file" id="upload" accept="image/*"><br><br>
    
    <label>橫向重複次數:</label>
    <input type="number" id="cols" value="2" min="1" style="width: 50px;">
    
    <label>縱向重複次數:</label>
    <input type="number" id="rows" value="1" min="1" style="width: 50px;">
    
    <button onclick="processImage()">預覽拼接</button>
    <button id="downloadBtn" style="display:none;" onclick="downloadImage()">下載結果</button>
</div>

<canvas id="canvas"></canvas>

<script>
    const upload = document.getElementById('upload');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const downloadBtn = document.getElementById('downloadBtn');
    let originalImage = null;

    // 處理上傳
    upload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                originalImage = img;
                processImage(); // 上傳後自動預覽一次
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // 執行拼接
    function processImage() {
        if (!originalImage) {
            alert('請先上傳圖片');
            return;
        }

        const cols = parseInt(document.getElementById('cols').value);
        const rows = parseInt(document.getElementById('rows').value);
        
        const w = originalImage.width;
        const h = originalImage.height;

        // 設定 Canvas 總大小
        canvas.width = w * cols;
        canvas.height = h * rows;

        // 雙重迴圈繪製圖片
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                ctx.drawImage(originalImage, c * w, r * h, w, h);
            }
        }

        downloadBtn.style.display = 'inline-block';
    }

    // 下載圖片
    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'stashed_image.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>

</body>
</html>
