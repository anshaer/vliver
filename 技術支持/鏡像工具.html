<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖片鏡像工具 v2</title>
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --accent-color: #e67e22; /* 橘色，用於新功能按鈕 */
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--secondary-color);
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 900px;
        }
        h2 { margin-bottom: 10px; }
        .subtitle { color: #7f8c8d; margin-bottom: 20px; font-size: 0.9em; }
        
        /* 檔案上傳按鈕樣式 */
        .upload-btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .upload-btn:hover { background-color: #2980b9; }
        input[type="file"] { display: none; }

        /* 畫布容器：加上 PNG 透明棋盤格背景 */
        #canvas-container {
            margin: 20px auto;
            max-width: 100%;
            max-height: 500px;
            overflow: auto;
            border: 2px solid #ddd;
            border-radius: 4px;
            background-image: 
                linear-gradient(45deg, #eee 25%, transparent 25%), 
                linear-gradient(-45deg, #eee 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #eee 75%),
                linear-gradient(-45deg, transparent 75%, #eee 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        canvas {
            display: block;
            margin: 0 auto;
            max-width: 100%;
        }

        /* 按鈕群組 */
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        button:hover {
            background: #f0f0f0;
            border-color: #bbb;
        }
        
        /* 特別突出新功能的樣式 */
        button.special {
            background-color: #fdf2e9;
            border-color: var(--accent-color);
            color: var(--accent-color);
            font-weight: bold;
        }
        button.special:hover {
            background-color: #fae5d3;
        }

        button.download {
            background-color: #27ae60;
            color: white;
            border: none;
            grid-column: 1 / -1;
            font-size: 16px;
            margin-top: 10px;
            padding: 12px;
        }
        button.download:hover { background-color: #219150; }
    </style>
</head>
<body>

<div class="container">
    <h2>圖片鏡像翻轉工具 v2</h2>
    <div class="subtitle">(支援 PNG 透明背景運算)</div>
    
    <label class="upload-btn">
        選擇圖片上傳
        <input type="file" id="fileInput" accept="image/png, image/jpeg, image/webp">
    </label>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <button onclick="applyTransform('flip-h')">↔️ 水平翻轉</button>
        <button onclick="applyTransform('flip-v')">↕️ 垂直翻轉</button>
        <button onclick="applyTransform('mirror-h-left')">🌓 水平鏡像(左像右)</button>
        <button onclick="applyTransform('mirror-h-right')">🌗 水平鏡像(右像左)</button>
        <button onclick="applyTransform('mirror-v-top')">🔼 垂直鏡像(上像下)</button>
        <button onclick="applyTransform('mirror-v-bottom')">🔽 垂直鏡像(下像上)</button>
        
        <button class="special" onclick="applyTransform('split-flip-h')">✂️ 中間切開，左右互換</button>
        
        <button class="download" onclick="downloadImage()">💾 下載 PNG 圖片</button>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let originalImage = null;

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                originalImage = img;
                canvas.width = img.width;
                canvas.height = img.height;
                resetCanvas();
                ctx.drawImage(img, 0, 0);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function resetCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function applyTransform(type) {
        if (!originalImage) {
            alert('請先上傳圖片！');
            return;
        }

        const w = canvas.width;
        const h = canvas.height;
        const halfW = w / 2;
        const halfH = h / 2;

        resetCanvas();

        switch (type) {
            case 'flip-h':
                ctx.save();
                ctx.translate(w, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(originalImage, 0, 0);
                ctx.restore();
                break;

            case 'flip-v':
                ctx.save();
                ctx.translate(0, h);
                ctx.scale(1, -1);
                ctx.drawImage(originalImage, 0, 0);
                ctx.restore();
                break;

            case 'mirror-h-left':
                ctx.drawImage(originalImage, 0, 0, halfW, h, 0, 0, halfW, h);
                ctx.save();
                ctx.translate(w, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(originalImage, 0, 0, halfW, h, 0, 0, halfW, h);
                ctx.restore();
                break;

            case 'mirror-h-right':
                ctx.drawImage(originalImage, halfW, 0, halfW, h, halfW, 0, halfW, h);
                ctx.save();
                ctx.translate(w, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(originalImage, halfW, 0, halfW, h, halfW, 0, halfW, h);
                ctx.restore();
                break;

            case 'mirror-v-top':
                ctx.drawImage(originalImage, 0, 0, w, halfH, 0, 0, w, halfH);
                ctx.save();
                ctx.translate(0, h);
                ctx.scale(1, -1);
                ctx.drawImage(originalImage, 0, 0, w, halfH, 0, 0, w, halfH);
                ctx.restore();
                break;

            case 'mirror-v-bottom':
                ctx.drawImage(originalImage, 0, halfH, w, halfH, 0, halfH, w, halfH);
                ctx.save();
                ctx.translate(0, h);
                ctx.scale(1, -1);
                ctx.drawImage(originalImage, 0, halfH, w, halfH, 0, halfH, w, halfH);
                ctx.restore();
                break;

            // 新增加的邏輯：中間切開，左右互換
            case 'split-flip-h':
                // 1. 處理左半邊：取原圖左半，畫到畫布右半
                ctx.drawImage(
                    originalImage, 
                    0, 0, halfW, h,      // 原圖裁剪區域 (左半)
                    halfW, 0, halfW, h   // 畫布目標區域 (右半)
                );
                
                // 2. 處理右半邊：取原圖右半，畫到畫布左半
                ctx.drawImage(
                    originalImage, 
                    halfW, 0, halfW, h,  // 原圖裁剪區域 (右半)
                    0, 0, halfW, h       // 畫布目標區域 (左半)
                );
                break;
        }
    }

    function downloadImage() {
        if (!originalImage) return;
        const link = document.createElement('a');
        link.download = 'processed_image_' + Date.now() + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>

</body>
</html>
