<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World + ASE 高速 API 展示</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://storage.googleapis.com/ase-player-cdn/ase-player.js"></script>
    
    <style>
        :root {
            --choco-dark: #3d2620;
            --mint-main: #8ee3cf;
        }
        body {
            margin: 0; padding: 20px; background-color: #f4f9f6;
            font-family: system-ui, sans-serif; color: var(--choco-dark);
            display: flex; flex-direction: column; align-items: center;
        }
        h1 { font-size: 2.5rem; border-bottom: 4px solid var(--mint-main); padding-bottom: 5px; margin-bottom: 25px; }
        
        /* 播放器外層排版容器：完全透明 */
        .player-container {
            width: 300px;
            height: 300px;
            background: transparent; 
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 畫布：自適應容器尺寸進行壓縮，絕不扭曲變形 */
        canvas { 
            display: block; 
            background: transparent; 
            width: 100%;           
            height: 100%;          
            object-fit: contain;   
        }
        
        .loading-text { font-style: italic; color: #777; padding: 20px; }
    </style>
</head>
<body>

    <h1>Hello World!</h1>

    <div class="player-container">
        <div id="loading" class="loading-text">正在透過台灣 GCS 機房載入 1.ase...</div>
        <canvas id="ase-canvas" style="display:none;"></canvas>
    </div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        // 🚀 調用您專屬的雲端 API 連結啟動播放
        AsePlayer.loadAndPlay('1.ase', 'ase-canvas', 'loading');
    });

    // 監聽時間軸事件標記
    window.addEventListener('ase-event', (e) => {
        console.log(`[展示頁監聽] 影格 ${e.detail.node} 撞擊自訂事件標記: ${e.detail.eventName}`);
    });
</script>
</body>
</html>
