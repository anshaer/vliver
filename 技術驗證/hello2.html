<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World + ASE Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --choco-dark: #3d2620;
            --mint-main: #8ee3cf;
        }
        body {
            margin: 0; padding: 20px;
            background-color: #f4f9f6;
            font-family: system-ui, sans-serif;
            color: var(--choco-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 2.5rem;
            border-bottom: 4px solid var(--mint-main);
            padding-bottom: 5px;
            margin-bottom: 25px;
        }
        /* 播放器透明底網格容器 */
        .player-container {
            background-color: #eee;
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%, transparent 75%, #ccc 75%, #ccc),
                              linear-gradient(45deg, #ccc 25%, #fff 25%, #fff 75%, #ccc 75%, #ccc);
            background-size: 20px 20px; background-position: 0 0, 10px 10px;
            border: 1px solid var(--choco-dark);
            border-radius: 8px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        canvas { display: block; background: transparent; }
        .loading-text { font-style: italic; color: #777; }
    </style>
</head>
<body>

    <h1>Hello World!</h1>

    <div class="player-container">
        <div id="loading" class="loading-text" style="padding: 20px;">正在自動載入 1.ase 動態專案...</div>
        <canvas id="ase-canvas" style="display:none;"></canvas>
    </div>

<script>
    // 網頁初始化載入
    window.addEventListener('DOMContentLoaded', () => {
        // 調用播放引擎，載入同目錄下的 1.ase 到畫布 id "ase-canvas"
        initAsePlayer('1.ase', 'ase-canvas');
    });

    // 核心自動化嵌入式播放引擎
    async function initAsePlayer(fileUrl, canvasId) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        const loadingDiv = document.getElementById('loading');

        try {
            // 1. 遠端讀取 .ase 檔案二進制流
            const response = await fetch(fileUrl);
            if(!response.ok) throw new Error("找不到指定的 .ase 檔案！");
            const arrayBuffer = await response.arrayBuffer();

            // 2. 解壓縮專案
            const zip = await JSZip.loadAsync(arrayBuffer);
            const configFile = zip.file("config.json");
            if(!configFile) throw new Error("專案內遺失 config.json");
            
            const config = JSON.parse(await configFile.async("text"));
            
            // 3. 配置透明畫布尺寸
            canvas.width = config.width;
            canvas.height = config.height;

            // 4. 解析內部圖片並轉成快取物件
            let imageElements = {};
            for(let imgData of config.images) {
                const pureName = imgData.filename.replace("images/", "");
                const zipImg = zip.file("images/" + pureName);
                if(zipImg) {
                    const blob = await zipImg.async("blob");
                    const url = URL.createObjectURL(blob);
                    await new Promise((resolve) => {
                        const img = new Image(); img.src = url;
                        img.onload = () => { imageElements[imgData.filename] = img; resolve(); };
                    });
                }
            }

            // 【已修正】顯示畫布，隱藏加載文字
            loadingDiv.style.display = 'none';
            canvas.style.display = 'block';

            // 5. 補間動畫邏輯計算
            function computeProps(layer, node) {
                if (node < layer.startNode || node > layer.endNode) return null;
                let points = [{ node: layer.startNode, props: layer.init }];
                Object.keys(layer.keyframes).forEach(k => { const n = parseInt(k); if(n > layer.startNode && n <= layer.endNode) points.push({ node: n, props: layer.keyframes[k] }); });
                points.sort((a,b) => a.node - b.node);
                if(node <= points[0].node) return points[0].props;
                if(node >= points[points.length-1].node) return points[points.length-1].props;
                let p1 = points[0], p2 = points[0];
                for(let i=0; i<points.length-1; i++){ if(node >= points[i].node && node <= points[i+1].node) { p1 = points[i]; p2 = points[i+1]; break; } }
                const t = (node - p1.node) / (p2.node - p1.node);
                return { x: p1.props.x + (p2.props.x - p1.props.x)*t, y: p1.props.y + (p2.props.y - p1.props.y)*t, w: p1.props.w + (p2.props.w - p1.props.w)*t, h: p1.props.h + (p2.props.h - p1.props.h)*t, rot: p1.props.rot + (p2.props.rot - p1.props.rot)*t, op: p1.props.op + (p2.props.op - p1.props.op)*t };
            }

            // 6. 播放計時器核心 (依照 config.loopType 支援順/反雙向循環)
            let currentNode = 0;
            let playDirection = 1;

            setInterval(() => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // 依圖層渲染順序繪製 (反向陣列繪製)
                for(let i = config.images.length - 1; i >= 0; i--) {
                    const layer = config.images[i];
                    const props = computeProps(layer, currentNode); if (!props) continue;
                    const img = imageElements[layer.filename]; if (!img) continue;
                    
                    ctx.save();
                    ctx.globalAlpha = Math.max(0, Math.min(1, props.op));
                    ctx.translate(props.x, props.y);
                    ctx.rotate(props.rot * Math.PI / 180);
                    ctx.drawImage(img, -props.w/2, -props.h/2, props.w, props.h);
                    ctx.restore();
                }

                // 計算下一格影格
                if(config.loopType === 'forward') {
                    currentNode = (currentNode + 1) % config.totalNodes;
                } else {
                    currentNode += playDirection;
                    if(currentNode >= config.totalNodes) { currentNode = config.totalNodes - 2; playDirection = -1; }
                    else if(currentNode < 0) { currentNode = 1; playDirection = 1; }
                }
            }, config.nodeDuration * 1000);

        } catch (err) {
            loadingDiv.textContent = "錯誤：" + err.message;
            loadingDiv.style.color = "red";
        }
    }
</script>
</body>
</html>
