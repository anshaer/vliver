<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World + ASE Player</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="ase-player.js"></script>
    
    <style>
        :root {
            --choco-dark: #3d2620;
            --mint-main: #8ee3cf;
        }
        body {
            margin: 0; padding: 20px; background-color: #f4f9f6;
            font-family: system-ui, sans-serif; color: var(--choco-dark);
            display: flex; flex-direction: column; align-items: center;
        }
        h1 { font-size: 2.5rem; border-bottom: 4px solid var(--mint-main); padding-bottom: 5px; margin-bottom: 25px; }
        
        .player-container {
            background-color: #eee;
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%, transparent 75%, #ccc 75%, #ccc),
                              linear-gradient(45deg, #ccc 25%, #fff 25%, #fff 75%, #ccc 75%, #ccc);
            background-size: 20px 20px; background-position: 0 0, 10px 10px;
            border: 1px solid var(--choco-dark); border-radius: 8px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1); overflow: hidden;
        }
        canvas { display: block; background: transparent; }
        .loading-text { font-style: italic; color: #777; }
    </style>
</head>
<body>

    <h1>Hello World!</h1>

    <div class="player-container">
        <div id="loading" class="loading-text" style="padding: 20px;">正在自動載入 1.ase 動態專案...</div>
        <canvas id="ase-canvas" style="display:none;"></canvas>
    </div>

<script>
    // 當網頁 HTML 結構加載完畢後執行
    window.addEventListener('DOMContentLoaded', () => {
        
        // 🚀 像調用 API 一樣，一行程式碼直接啟動！
        // 參數說明: AsePlayer.loadAndPlay('您的.ase路徑', 'Canvas的ID', '讀取中提示的ID')
        AsePlayer.loadAndPlay('1.ase', 'ase-canvas', 'loading');
        
    });
</script>
</body>
</html>
